<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>endgame-ai</title>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<style>
  :root {
    color-scheme: dark;
    --bg: #06080d;
    --panel: #0c1220;
    --line: #1a2744;
    --accent: #38bdf8;
    --text: #e2e8f0;
    --muted: #64748b;
    --toolbar-h: clamp(2.75rem, 8vw, 3rem);
    --panel-w: clamp(16rem, 32vw, 22rem);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100dvh; overflow: hidden; }
  body {
    font-family: system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: grid;
    grid-template-rows: var(--toolbar-h) 1fr;
  }
  #toolbar {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0 0.6rem;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    overscroll-behavior: contain;
    scrollbar-width: none;
  }
  #toolbar::-webkit-scrollbar { display: none; }
  #toolbar h1 {
    color: var(--accent);
    font-size: clamp(0.7rem, 2.5vw, 0.8rem);
    white-space: nowrap;
    margin-right: 0.25rem;
  }
  #toolbar button {
    flex: 0 0 auto;
    padding: 0.35rem 0.55rem;
    border: 1px solid var(--line);
    border-radius: 0.35rem;
    background: var(--panel);
    color: var(--text);
    font-size: clamp(0.65rem, 2.2vw, 0.72rem);
    touch-action: manipulation;
  }
  #toolbar button:active { border-color: var(--accent); color: var(--accent); }
  #status {
    margin-inline-start: auto;
    font-size: clamp(0.58rem, 2vw, 0.68rem);
    color: var(--muted);
    white-space: nowrap;
    max-width: min(42vw, 14rem);
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #shell {
    min-height: 0;
    display: grid;
    grid-template-columns: 1fr var(--panel-w);
    grid-template-rows: 1fr;
  }
  @media (max-width: 720px) {
    #shell {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr min(42dvh, 50%);
    }
  }
  #cy {
    min-height: 0;
    background: var(--bg) radial-gradient(circle at 1px 1px, #141c2e 1px, transparent 0) 0 0 / 18px 18px;
  }
  #panel {
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border-inline-start: 1px solid var(--line);
    overflow: hidden;
  }
  @media (max-width: 720px) {
    #panel { border-inline-start: none; border-top: 1px solid var(--line); }
  }
  #panel-head {
    flex: 0 0 auto;
    padding: 0.55rem 0.65rem 0.35rem;
    font-size: 0.62rem;
    color: var(--muted);
    border-bottom: 1px solid var(--line);
  }
  #panel-body {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 0.55rem 0.65rem 0.75rem;
    font-size: 0.68rem;
    -webkit-overflow-scrolling: touch;
  }
  #panel-body h3 { color: var(--accent); font-size: 0.75rem; margin-bottom: 0.35rem; }
  #panel-body label {
    display: block;
    color: var(--muted);
    font-size: 0.58rem;
    text-transform: uppercase;
    margin: 0.45rem 0 0.15rem;
  }
  #panel-body textarea {
    width: 100%;
    min-height: 4.5rem;
    field-sizing: content;
    background: #111827;
    border: 1px solid var(--line);
    border-radius: 0.35rem;
    color: var(--text);
    font: 0.62rem/1.35 ui-monospace, monospace;
    padding: 0.45rem;
    resize: none;
  }
  #panel-body .btn {
    width: 100%;
    margin-top: 0.45rem;
    padding: 0.45rem;
    border: 1px solid var(--line);
    border-radius: 0.35rem;
    background: var(--panel);
    color: var(--accent);
    font-size: 0.68rem;
    touch-action: manipulation;
  }
  #panel-body .log {
    font: 0.58rem/1.35 ui-monospace, monospace;
    color: #94a3b8;
    max-height: 6rem;
    overflow-y: auto;
  }
  #err {
    display: none;
    padding: 0.4rem 0.65rem;
    background: #450a0a;
    border-bottom: 1px solid #ef4444;
    color: #fecaca;
    font-size: 0.68rem;
  }
</style>
</head>
<body>
<nav id="toolbar">
  <h1>⚡ endgame</h1>
  <button id="btn-save">Save</button>
  <button id="btn-layout">Layout</button>
  <button id="btn-step">Step</button>
  <button id="btn-run">Run</button>
  <button id="btn-stop">Stop</button>
  <button id="btn-auto">Auto</button>
  <span id="status">…</span>
</nav>
<div id="err" role="alert"></div>
<div id="shell">
  <div id="cy"></div>
  <aside id="panel">
    <div id="panel-head">GET /wiring · tap a chip to edit</div>
    <div id="panel-body"></div>
  </aside>
</div>
<script type="module">
cytoscape.use(cytoscapeDagre);

const COLORS = {
  entry:'#166534', planner:'#5b21b6', scheduler:'#1e40af', observe:'#0e7490',
  act:'#7e22ce', verify:'#047857', reflect:'#b45309', satisfied:'#15803d',
  bus_check:'#1e3a5f', bus_post:'#9a3412', moe_route:'#86198f', self_modify:'#be185d'
};

const SERVER = location.origin;
const $ = id => document.getElementById(id);
const panel = $('panel-body');
const status = t => { $('status').textContent = t; };
const fail = t => { const e = $('err'); e.style.display = 'block'; e.textContent = t; };

let wiring, cy, selectedId, lastEditId;
let liveNode, liveState, liveRun, liveStop, liveLog = [];
let baseEdit = '', roleEdit = '', blocksEdit = '[]';

const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const topo = id => wiring?.topology?.nodes?.find(n => n.id === id);
const circuit = n => n?.prompt ? (n.prompt.role || n.circuit || n.type) : null;

function initCy() {
  cy = cytoscape({
    container: $('cy'),
    style: [
      { selector: 'node', style: {
        shape: 'round-rectangle', width: 120, height: 40,
        'background-color': '#0f172a', 'border-width': 2,
        'border-color': e => COLORS[e.data('type')] || '#475569',
        label: 'data(label)', color: '#f8fafc', 'font-size': 10, 'font-weight': 600,
        'text-valign': 'center', 'overlay-opacity': 0
      }},
      { selector: 'edge', style: {
        width: 1.5, 'line-color': '#0e7490', 'target-arrow-color': '#22d3ee',
        'target-arrow-shape': 'triangle', 'arrow-scale': 0.65, 'curve-style': 'bezier',
        label: 'data(signal)', 'font-size': 7, color: '#64748b',
        'text-background-color': '#06080d', 'text-background-opacity': 0.9, 'text-background-padding': 2
      }},
      { selector: 'node.active', style: { 'border-color': '#4ade80', 'border-width': 3 }},
      { selector: 'node.selected', style: { 'border-color': '#fbbf24', 'border-width': 3 }},
      { selector: '.dim', style: { opacity: 0.22 }}
    ],
    minZoom: 0.15, maxZoom: 3, wheelSensitivity: 0.15
  });
  cy.on('tap', 'node', e => pick(e.target.id()));
  cy.on('tap', e => { if (e.target === cy) pick(null); });
  new ResizeObserver(() => cy.resize()).observe($('cy'));
}

function toElements(w) {
  const t = w.topology;
  return [
    ...t.nodes.map(n => ({ data: { id: n.id, label: n.id, type: n.type }})),
    ...t.edges.map((e, i) => ({ data: { id: `e${i}`, source: e.from, target: e.to, signal: e.on || '' }}))
  ];
}

function layout() {
  cy.layout({ name: 'dagre', rankDir: 'LR', nodeSep: 36, rankSep: 64, animate: false }).run();
  cy.fit(36);
}

function draw(w) {
  if (!cy) initCy();
  cy.elements().remove();
  cy.add(toElements(w));
  layout();
}

function glow(id) {
  cy.nodes().removeClass('active dim');
  if (!id) return;
  cy.nodes().addClass('dim');
  cy.getElementById(id).removeClass('dim').addClass('active');
}

function pick(id) {
  selectedId = id;
  if (id !== lastEditId) lastEditId = null;
  cy.nodes().removeClass('selected');
  if (id) cy.getElementById(id).addClass('selected');
  paintPanel();
}

function loadEdits() {
  const n = topo(selectedId), c = circuit(n);
  roleEdit = c ? (wiring.prompts?.roles?.[c] || '') : '';
  blocksEdit = JSON.stringify(n?.prompt?.user?.blocks || [], null, 2);
}

function paintPanel() {
  if (!wiring) { panel.innerHTML = '<p>No wiring.</p>'; return; }
  let h = `<h3>Base</h3><label>prompts.base</label><textarea id="ta-base">${esc(baseEdit)}</textarea>`;
  if (selectedId) {
    if (selectedId !== lastEditId) { loadEdits(); lastEditId = selectedId; }
    const n = topo(selectedId), c = circuit(n);
    h += `<h3>${esc(selectedId)}</h3><label>type</label>${esc(n?.type)}<label>label</label>${esc(n?.label)}`;
    if (c && n?.prompt) {
      h += `<label>role ${esc(c)}</label><textarea id="ta-role">${esc(roleEdit)}</textarea>
        <label>blocks</label><textarea id="ta-blocks">${esc(blocksEdit)}</textarea>
        <button class="btn" id="btn-apply">Apply</button>`;
    }
    h += `<button class="btn" id="btn-save2">Save</button>`;
  } else {
    h += `<p style="color:var(--muted);margin-top:.5rem">Tap a chip.</p>`;
  }
  if (liveLog.length) {
    h += `<label>log</label><div class="log">${liveLog.slice(-8).map(l =>
      `${esc(l.t)} ${esc(l.n)} [${esc(l.s)}]`).join('<br>')}</div>`;
  }
  panel.innerHTML = h;
  $('ta-base')?.addEventListener('input', e => { baseEdit = e.target.value; });
  $('ta-role')?.addEventListener('input', e => { roleEdit = e.target.value; });
  $('ta-blocks')?.addEventListener('input', e => { blocksEdit = e.target.value; });
  $('btn-apply')?.addEventListener('click', apply);
  $('btn-save2')?.addEventListener('click', save);
}

function apply() {
  const n = topo(selectedId), c = circuit(n);
  if (!n?.prompt || !c) return;
  let blocks;
  try { blocks = JSON.parse(blocksEdit); } catch { fail('invalid blocks JSON'); return; }
  wiring.prompts ??= { base: '', roles: {} };
  wiring.prompts.roles ??= {};
  wiring.prompts.base = baseEdit;
  wiring.prompts.roles[c] = roleEdit;
  n.prompt.user = { blocks };
  status(`Applied ${selectedId}`);
}

async function load() {
  wiring = await (await fetch(`${SERVER}/wiring`)).json();
  baseEdit = wiring.prompts?.base || '';
  draw(wiring);
  paintPanel();
  const n = wiring.topology.nodes.length, e = wiring.topology.edges.length;
  status(`${n} chips · ${e} traces`);
}

async function save() {
  wiring.prompts ??= {};
  wiring.prompts.base = baseEdit;
  const r = await fetch(`${SERVER}/wiring`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(wiring)
  });
  const d = await r.json();
  if (!r.ok || d.error) throw new Error(d.error || 'save failed');
  status(`Saved ${d.nodes} nodes`);
}

const fresh = g => ({
  goal: g, step: 0, retries: 0, history: [], reasoning: {}, reasoning_chain: [],
  planner_retries: 0, replan_count: 0, last_error: '', bus_last_check: Date.now() / 1e3, no_desktop: false
});

const next = (from, sigs) => wiring.topology.edges
  .filter(e => e.from === from && (e.on === '*' || (e.on || '').split('|').some(s => sigs.includes(s))))
  .map(e => e.to)[0] ?? null;

async function call(id, state) {
  const type = topo(id)?.type || 'unknown';
  return (await fetch(`${SERVER}/node/${type}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ state })
  })).json();
}

function needGoal() {
  if (liveState) return true;
  const g = prompt('Goal:');
  if (!g) return false;
  liveState = fresh(g);
  liveNode = wiring.topology.cycle_start;
  liveLog = [];
  glow(liveNode);
  paintPanel();
  return true;
}

async function advance() {
  if (!liveNode) return false;
  const id = liveNode;
  glow(id);
  status(`… ${id}`);
  const r = await call(id, liveState);
  liveState = { ...liveState, ...r.state_patch };
  const s = r.signals || [];
  liveLog.push({ t: new Date().toLocaleTimeString(), n: id, s: s.join(',') });
  liveNode = next(id, s);
  status(`${id} → [${s}]${liveNode ? ' → ' + liveNode : ''}`);
  glow(liveNode);
  paintPanel();
  return !!(liveNode && !s.includes('idle') && !liveState.satisfied);
}

async function step() {
  if (!needGoal() || !liveNode) return status(liveNode ? '…' : 'done');
  await advance();
}

async function run() {
  if (!needGoal()) return;
  liveRun = true; liveStop = false;
  while (liveRun && !liveStop && liveNode) {
    if (!await advance()) break;
    await new Promise(r => setTimeout(r, 300));
  }
  liveRun = false;
  status('run done');
}

const sse = new EventSource(`${SERVER}/events`);
sse.addEventListener('node', e => { const d = JSON.parse(e.data); glow(d.id); status(`auto ${d.id}`); });
sse.addEventListener('stop', () => { glow(null); status('auto done'); });

$('btn-save').onclick = () => save().catch(e => fail(e.message));
$('btn-layout').onclick = () => layout();
$('btn-step').onclick = () => step().catch(e => fail(e.message));
$('btn-run').onclick = () => run().catch(e => fail(e.message));
$('btn-stop').onclick = () => { liveStop = true; liveRun = false; status('stopped'); };
$('btn-auto').onclick = () => {
  const g = prompt('Goal:');
  if (g) fetch(`${SERVER}/run`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ goal: g }) });
};

try {
  const h = await (await fetch(`${SERVER}/health`)).json();
  if (!h.ok) throw new Error('health failed');
  status(`:${location.port} slot ${h.slot ?? '?'}`);
  await load();
} catch (e) {
  fail(e.message);
  status('offline');
}
</script>
</body>
</html>
