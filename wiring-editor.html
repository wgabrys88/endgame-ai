<!DOCTYPE html>

.toolbar { grid-column: 1/-1; display: flex; align-items: center; gap: 8px; padding: 0 12px; background: #0f172a; border-bottom: 1px solid #1e293b; }

.toolbar button:hover { border-color: #06b6d4; color: #06b6d4; }

.timeline h3 { font-size: 11px; color: #06b6d4; margin-bottom: 6px; }

.timeline .controls button { padding: 3px 8px; border: 1px solid #1e293b; border-radius: 3px; background: #0f172a; color: #cbd5e1; cursor: pointer; font-size: 11px; }

/* Node styling */
.wiring-node { background: #0f172a; border: 1.5px solid #1e293b; border-radius: 8px; min-width: 160px; font-size: 11px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); transition: all 0.3s; }
.wiring-node.selected { border-color: #06b6d4; box-shadow: 0 0 12px rgba(6,182,212,0.3); }

.wiring-node .ntype { padding: 5px 10px; border-radius: 6px 6px 0 0; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #fff; }
.wiring-node .nbody { padding: 6px 10px; }

.ntype-entry { background: #166534; }
.ntype-planner { background: #4c1d95; }
.ntype-scheduler { background: #1e3a5f; }
.ntype-observe { background: #0c4a6e; }

.react-flow__edge-text { fill: #06b6d4 !important; font-size: 9px !important; }
.react-flow__edge-textbg { fill: #0a0a0f !important; fill-opacity: 0.9 !important; }
.react-flow__panel { display: none !important; }
.react-flow__minimap { background: #0f172a !important; }

/* Modal */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; display: flex; align-items: center; justify-content: center; }
.modal { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 16px; min-width: 300px; }
.modal h3 { font-size: 13px; color: #06b6d4; margin-bottom: 12px; }
.modal label { display: block; font-size: 10px; color: #64748b; margin: 6px 0 2px; }
.modal input, .modal select { width: 100%; padding: 6px 8px; background: #1a1a2e; border: 1px solid #1e293b; border-radius: 4px; color: #e2e8f0; font-size: 11px; }
.modal .btns { display: flex; gap: 6px; margin-top: 12px; }
.modal .btns button { flex: 1; padding: 6px; border: 1px solid #1e293b; border-radius: 4px; background: #0f172a; color: #cbd5e1; cursor: pointer; font-size: 11px; }
.modal .btns button.primary { background: #06b6d4; color: #000; border-color: #06b6d4; }

<script type="text/babel" data-type="module">
import React, { useState, useCallback, useRef, useMemo, useEffect } from 'react';
import { createRoot } from 'react-dom/client';
import {
  ReactFlow, Controls, Background, MiniMap,
  useNodesState, useEdgesState, addEdge,
  Handle, Position, MarkerType, useReactFlow,
  ReactFlowProvider
} from '@xyflow/react';
import dagre from '@dagrejs/dagre';

// ============ LOG PARSER ============
function parseLog(text) {
  const cycles = [];
  const lines = text.split('\n');
  let current = null;
  let section = null;
  let buffer = [];
  function flush() {
    if (!current || !section) return;
    const txt = buffer.join('\n').trim();
    if (section === 'sys') current.request.system = txt;
    else if (section === 'usr') current.request.user = txt;
    else if (section === 'content') current.response.content = txt;
    else if (section === 'reasoning') current.response.reasoning = txt;
    buffer = []; section = null;
  }
  for (const line of lines) {
    const rm = line.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d+) REQUEST$/);
    if (rm) { flush(); if (current) cycles.push(current); current = { timestamp: rm[1], request: {system:'',user:''}, response: {content:'',reasoning:''}, stats: {}, nodes_hit: [] }; section='sys'; buffer=[]; continue; }
    const rr = line.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d+) RESPONSE \[(.+?)\]$/);
    if (rr) { flush(); if(current){ current.response.timestamp=rr[1]; current.stats.duration=rr[2]; } section='content'; buffer=[]; continue; }
    if (section==='sys' && line==='USER:') { flush(); section='usr'; buffer=[]; continue; }
    if (section==='sys' && line==='SYSTEM:') { buffer=[]; continue; }
    if (line==='CONTENT:' && current) { flush(); section='content'; buffer=[]; continue; }
    if (line==='REASONING:' && current) { flush(); section='reasoning'; buffer=[]; continue; }
    const sm = line.match(/^\d{4}-.+ \[(\w+)\] prompt=(\d+) ctx=(\d+) .+ response=(\d+) reasoning=(\d+)$/);
    if (sm && current) {
      flush();
      current.stats = { ...current.stats, circuit: sm[1], prompt: +sm[2], ctx: +sm[3], resp: +sm[4], reas: +sm[5] };
      try {
        const j = JSON.parse(current.response.content);
        current.stats.conclusion = j?.data?.conclusion || '?';
        current.stats.actions = j?.data?.actions || [];
      } catch(e) { current.stats.conclusion = 'ERR'; }
      // Derive which nodes were hit this cycle
      current.nodes_hit = ['response_limit_gate','route_slot','observe_screen','build_request','llm_call','parse_pipeline'];
      if (current.stats.conclusion === 'EXECUTE') current.nodes_hit.push('desktop_exec','audit_log');
      else if (current.stats.conclusion === 'DONE') current.nodes_hit.push('idle');
      else current.nodes_hit.push('feedback_append');
      continue;
    }
    if (section) buffer.push(line);
  }
  flush(); if (current) cycles.push(current);
  return cycles;
}

// ============ LAYOUT (ELK-style via dagre) ============
function layoutGraph(nodes, edges, direction = 'LR') {
  const g = new dagre.graphlib.Graph().setDefaultEdgeLabel(() => ({}));
  g.setGraph({ rankdir: direction, nodesep: 50, ranksep: 100, edgesep: 20 });
  nodes.forEach(n => g.setNode(n.id, { width: 190, height: 72 }));
  edges.forEach(e => g.setEdge(e.source, e.target));
  dagre.layout(g);
  return nodes.map(n => { const p = g.node(n.id); return { ...n, position: { x: p.x - 95, y: p.y - 36 } }; });
}

// ============ WIRING ADAPTER ============
function wiringToFlow(wiring) {
  const t = wiring.topology || {};
  const nodes = (t.nodes || []).map(n => ({
    id: n.id, type: 'wiringNode',
    data: { ...n },
    position: { x: 0, y: 0 }
  }));
  const edges = (t.edges || []).map((e, i) => ({
    id: `e${i}`, source: e.from, target: e.to, label: e.on || '',
    markerEnd: { type: MarkerType.ArrowClosed, color: '#06b6d4', width: 16, height: 16 },
    style: { stroke: '#06b6d4', strokeWidth: 1.5 },
    animated: (e.on||'').includes('actions_present'),
    data: { on: e.on }
  }));
  const laid = layoutGraph(nodes, edges, 'LR');
  return { nodes: laid, edges };
}

function flowToWiring(nodes, edges, original) {
  const tNodes = nodes.map(n => {
    const { id, type, label, ...extra } = n.data;
    const base = { id, type, label };
    Object.keys(extra).forEach(k => { if (k !== 'replay') base[k] = extra[k]; });
    return base;
  });
  const tEdges = edges.map(e => ({ from: e.source, to: e.target, on: e.data?.on || e.label || '' }));
  return { ...original, topology: { ...original.topology, nodes: tNodes, edges: tEdges } };
}

// ============ CUSTOM NODE ============
function WiringNode({ data, selected }) {
  const cls = `ntype-${data.type || 'unknown'}`;
  const isActive = data.replay;
  return (
    <div className={`wiring-node${selected ? ' selected' : ''}${isActive ? ' active-replay' : ''}`}>
      <Handle type="target" position={Position.Left} />
      <div className={`ntype ${cls}`}>{data.type}</div>
      <div className="nbody">
        <div className="nid">{data.id}</div>
        <div className="nlabel">{data.label || ''}</div>
        {data.replayData && <div className="ndata" title={data.replayData}>{data.replayData}</div>}
      </div>
      <Handle type="source" position={Position.Right} />
    </div>
  );
}
const nodeTypes = { wiringNode: WiringNode };

// ============ MODAL ============
function Modal({ title, children, onClose }) {
  return (<div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}><h3>{title}</h3>{children}</div></div>);
}

// ============ MAIN APP ============
function App() {
  const [nodes, setNodes, onNodesChange] = useNodesState([]);
  const [edges, setEdges, onEdgesChange] = useEdgesState([]);
  const [wiring, setWiring] = useState(null);
  const [logCycles, setLogCycles] = useState([]);
  const [cycleIdx, setCycleIdx] = useState(-1);
  const [playing, setPlaying] = useState(false);
  const [selectedNode, setSelectedNode] = useState(null);
  const [modal, setModal] = useState(null);
  const [status, setStatus] = useState('Load wiring.json to start');
  const { fitView } = useReactFlow();
  const playRef = useRef(null);

  // Auto-connect to server on mount
  useEffect(() => {
    fetch(`${SERVER}/health`).then(r => r.json()).then(h => {
      setStatus(`Server connected: ${h.nodes.length} node types`);
      return fetch(`${SERVER}/wiring`).then(r => r.json());
    }).then(w => {
      setWiring(w);
      const { nodes: n, edges: e2 } = wiringToFlow(w);
      setNodes(n); setEdges(e2);
      setStatus(`Connected + loaded: ${n.length} nodes, ${e2.length} edges`);
      setTimeout(() => fitView({ padding: 0.15 }), 200);
    }).catch(() => setStatus('Server offline — use 📂 to load manually'));
  }, []);

  // Load wiring

  // SSE: observe autonomous --run mode live
  useEffect(() => {
    let es;
    try { es = new EventSource(`${SERVER}/events`); } catch(e) { return; }
    es.addEventListener("node_fire", e => {
      const d = JSON.parse(e.data);
      setNodes(ns => ns.map(n => ({...n, data: {...n.data, replay: n.id === d.node, replayData: n.id === d.node ? "● LIVE" : null}})));
      setStatus(`[auto] cycle ${d.cycle}: ${d.node}`);
    });
    es.addEventListener("node_result", e => {
      const d = JSON.parse(e.data);
      setLiveLog(log => [...log.slice(-50), {node: d.node, signals: d.signals, data: d.data, ts: new Date().toLocaleTimeString()}]);
    });
    es.addEventListener("rod_stop", e => {
      const d = JSON.parse(e.data);
      setStatus(`[auto] Rod stopped: ${d.reason} (${d.outcome})`);
      setNodes(ns => ns.map(n => ({...n, data: {...n.data, replay: false, replayData: null}})));
    });
    es.onerror = () => {};
    return () => es.close();
  }, []);

  const loadWiring = () => {
    const el = document.getElementById('file-wiring');
    el.onchange = e => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = ev => {
        try {
          const w = JSON.parse(ev.target.result);
          setWiring(w);
          const { nodes: n, edges: e2 } = wiringToFlow(w);
          setNodes(n); setEdges(e2);
          setStatus(`Loaded: ${n.length} nodes, ${e2.length} edges`);
          setTimeout(() => fitView({ padding: 0.15 }), 100);
        } catch(err) { alert('JSON error: ' + err.message); }
      };
      r.readAsText(f); el.value = '';
    };
    el.click();
  };

  // Load log
  const loadLog = () => {
    const el = document.getElementById('file-log');
    el.onchange = e => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = ev => {
        const cycles = parseLog(ev.target.result);
        setLogCycles(cycles);
        setCycleIdx(cycles.length > 0 ? 0 : -1);
        setStatus(`Log: ${cycles.length} cycles loaded`);
      };
      r.readAsText(f); el.value = '';
    };
    el.click();
  };

  // Save
  const saveWiring = () => {
    const base = wiring || { schema:'endgame-topology/v1', topology:{ cycle_start:'response_limit_gate', nodes:[], edges:[] } };
    const out = flowToWiring(nodes, edges, base);
    const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'wiring.json'; a.click();
    setStatus('Saved ✓');
  };

  // Re-layout
  const doLayout = () => {
    const laid = layoutGraph(nodes, edges, 'LR');
    setNodes(laid);
    setTimeout(() => fitView({ padding: 0.15 }), 50);
  };

  // Connect
  const onConnect = useCallback(params => {
    const signal = prompt('Signal name (on):');
    if (!signal) return;
    const e = { ...params, id: `e${Date.now()}`, label: signal, data: { on: signal }, markerEnd: { type: MarkerType.ArrowClosed, color: '#06b6d4', width: 16, height: 16 }, style: { stroke: '#06b6d4', strokeWidth: 1.5 } };
    setEdges(es => addEdge(e, es));
  }, []);

  // Add node
  const addNode = () => {
    const id = prompt('Node ID:'); if (!id) return;
    const type = prompt('Type (gate, llm, feedback, ...):') || 'unknown';
    const label = prompt('Label:') || '';
    setNodes(ns => [...ns, { id, type: 'wiringNode', data: { id, type, label }, position: { x: 300, y: 200 } }]);
  };

  // Replay: highlight nodes for current cycle
  useEffect(() => {
    if (cycleIdx < 0 || !logCycles.length) {
      setNodes(ns => ns.map(n => ({ ...n, data: { ...n.data, replay: false, replayData: null } })));
      return;
    }
    const cycle = logCycles[cycleIdx];
    const hitSet = new Set(cycle.nodes_hit || []);
    setNodes(ns => ns.map(n => {
      const hit = hitSet.has(n.id);
      let rd = null;
      if (hit && n.id === 'llm_call') rd = cycle.stats.duration || '';
      if (hit && n.id === 'parse_pipeline') rd = cycle.stats.conclusion || '';
      if (hit && n.id === 'desktop_exec') rd = (cycle.stats.actions||[]).map(a=>`${a.verb} ${a.target}`).join(', ');
      if (hit && n.id === 'observe_screen') {
        const m = (cycle.request.user||'').match(/SCREEN: (.{0,60})/);
        rd = m ? m[1] + '…' : '';
      }
      return { ...n, data: { ...n.data, replay: hit, replayData: rd } };
    }));
  }, [cycleIdx, logCycles]);

  // Auto-play
  useEffect(() => {
    if (!playing) { if (playRef.current) clearInterval(playRef.current); return; }
    playRef.current = setInterval(() => {
      setCycleIdx(i => {
        if (i >= logCycles.length - 1) { setPlaying(false); return i; }
        return i + 1;
      });
    }, 1500);
    return () => clearInterval(playRef.current);
  }, [playing, logCycles.length]);

  // Node click → sidebar
  const onNodeClick = useCallback((_, node) => setSelectedNode(node), []);

  // ============ LIVE EXECUTION ENGINE ============
  const SERVER = 'http://127.0.0.1:9077';
  const [liveState, setLiveState] = useState({});
  const [liveNode, setLiveNode] = useState(null);
  const [liveLog, setLiveLog] = useState([]);
  const [liveRunning, setLiveRunning] = useState(false);
  const [liveMode, setLiveMode] = useState(false); // false=replay, true=live
  const liveStopped = useRef(false);

  // Follow edges: given signals from current node, find next targets
  const followEdges = (fromId, signals, wiringObj) => {
    const tEdges = wiringObj?.topology?.edges || [];
    const targets = [];
    for (const edge of tEdges) {
      if (edge.from !== fromId) continue;
      const parts = (edge.on || '').split('|');
      if (parts.some(p => signals.includes(p)) || edge.on === '*') {
        targets.push(edge.to);
      }
    }
    return targets;
  };

  // Get node type from id
  const getNodeType = (nodeId, wiringObj) => {
    const n = (wiringObj?.topology?.nodes || []).find(n => n.id === nodeId);
    return n?.type || 'unknown';
  };

  // Highlight active node
  const highlightNode = (nodeId) => {
    setNodes(ns => ns.map(n => ({
      ...n, data: { ...n.data, replay: n.id === nodeId, replayData: n.id === nodeId ? '● ACTIVE' : null }
    })));
    setLiveNode(nodeId);
  };

  // Run continuously
  const runLive = async () => {
    if (!wiring) { alert('Load wiring.json first'); return; }
    const goal = prompt('GOAL:');
    if (!goal) return;
    const startNode = wiring.topology.cycle_start || 'response_limit_gate';
    const initState = { goal, circuit: 'unified', response_limit: 0, response_count: 0, reasoning_history: [], no_desktop: false };
    setLiveState(initState);
    setLiveNode(startNode);
    setLiveLog([]);
    setLiveMode(true);
    liveStopped.current = false;
    setStatus('Live: running...');
    highlightNode(startNode);
    // Run loop
    let state = initState;
    let node = startNode;
    while (node && !liveStopped.current) {
      highlightNode(node);
      await new Promise(r => setTimeout(r, 400));
      const nodeType = getNodeType(node, wiring);
      let result;
      try {
        const res = await fetch(`${SERVER}/node/${nodeType}`, {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ state, config: {} })
        });
        result = await res.json();
      } catch(e) { setStatus(`Error: ${e.message}`); break; }
      const entry = { node, type: nodeType, signals: result.signals, data: result.data, ts: new Date().toLocaleTimeString() };
      setLiveLog(log => [...log, entry]);
      state = { ...state, ...result.state_patch };
      setLiveState(state);
      const targets = followEdges(node, result.signals || [], wiring);
      // Fire fan-out secondaries
      for (let i = 1; i < targets.length; i++) {
        try { await fetch(`${SERVER}/node/${getNodeType(targets[i], wiring)}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({state,config:{}}) }); } catch(e){}
        setLiveLog(log => [...log, { node: targets[i], type: getNodeType(targets[i], wiring), signals:['fan-out'], data:{}, ts: new Date().toLocaleTimeString() }]);
      }
      node = targets[0] || null;
      if (!node || result.signals?.includes('idle') || result.signals?.includes('limit_reached')) {
        highlightNode(null);
        setStatus(`Live: finished (${result.signals?.join(',')})`);
        break;
      }
    }
    setLiveRunning(false);
    setLiveNode(null);
  };

  // Step loop effect - REMOVED (loop is in runLive now)

  // Manual step
  const liveStateRef = useRef(liveState);
  useEffect(() => { liveStateRef.current = liveState; }, [liveState]);

  const stepManual = async () => {
    if (!liveNode && wiring) {
      const goal = prompt('GOAL:');
      if (!goal) return;
      const startNode = wiring.topology.cycle_start || 'response_limit_gate';
      const initState = { goal, circuit: 'unified', response_limit: 0, response_count: 0, reasoning_history: [], no_desktop: false };
      setLiveState(initState);
      liveStateRef.current = initState;
      setLiveNode(startNode);
      setLiveLog([]);
      setLiveMode(true);
      highlightNode(startNode);
      setStatus('Live: step mode — click Step to advance');
      return;
    }
    if (!liveNode) return;
    const state = liveStateRef.current;
    const nodeType = getNodeType(liveNode, wiring);
    let result;
    try {
      const res = await fetch(`${SERVER}/node/${nodeType}`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ state, config: {} })
      });
      result = await res.json();
    } catch(e) { setStatus(`Error: ${e.message}`); return; }
    const entry = { node: liveNode, type: nodeType, signals: result.signals, data: result.data, ts: new Date().toLocaleTimeString() };
    setLiveLog(log => [...log, entry]);
    const newState = { ...state, ...result.state_patch };
    setLiveState(newState);
    liveStateRef.current = newState;
    const targets = followEdges(liveNode, result.signals || [], wiring);
    for (let i = 1; i < targets.length; i++) {
      try { await fetch(`${SERVER}/node/${getNodeType(targets[i], wiring)}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({state:newState,config:{}}) }); } catch(e){}
    }
    const next = targets[0] || null;
    setLiveNode(next);
    highlightNode(next);
    if (!next) setStatus('Live: finished');
    else setStatus(`Step: ${liveNode} → [${result.signals}] → ${next}`);
  };

  const stopLive = () => {
    liveStopped.current = true;
    setLiveRunning(false);
    setStatus('Live: stopped by user');
  };

  const cycle = cycleIdx >= 0 ? logCycles[cycleIdx] : null;

  return (
    <div className="app">
      <div className="toolbar">
        <h1>⚡ endgame-ai wiring</h1>
        <div className="sep"/>
        <button onClick={loadWiring}>📂 Wiring</button>
        <button onClick={loadLog}>📋 Log</button>
        <button onClick={saveWiring}>💾 Save</button>
        <div className="sep"/>
        <button onClick={addNode}>+ Node</button>
        <button onClick={doLayout}>⟳ Layout</button>
        <div className="sep"/>
        <button onClick={runLive} className={liveRunning?'active':''}>🚀 Run</button>
        <button onClick={stepManual}>⏩ Step</button>
        <button onClick={stopLive}>⏹ Stop</button>
        <div className="spacer"/>
        <span className="status">{status}</span>
      </div>

      <div className="canvas">
        <ReactFlow
          nodes={nodes} edges={edges}
          onNodesChange={onNodesChange} onEdgesChange={onEdgesChange}
          onConnect={onConnect} onNodeClick={onNodeClick}
          nodeTypes={nodeTypes} fitView
          defaultEdgeOptions={{ type:'default', style:{stroke:'#06b6d4'}, markerEnd:{type:MarkerType.ArrowClosed,color:'#06b6d4'} }}
          proOptions={{ hideAttribution: true }}
        >
          <Background color="#1e293b" gap={24} size={1}/>
          <Controls position="bottom-left"/>
          <MiniMap style={{background:'#0f172a'}} nodeColor="#1e293b" maskColor="rgba(0,0,0,0.6)"/>
        </ReactFlow>
      </div>

      <div className="sidebar">
        {liveMode && liveLog.length > 0 ? (<>
          <div className="section">
            <h3>Live Execution</h3>
            <label>Current Node</label><span style={{color:'#22c55e'}}>{liveNode || '(stopped)'}</span>
            <label>Goal</label><span>{liveState.goal}</span>
            <label>Responses</label><span>{liveState.response_count || 0}</span>
          </div>
          <div className="section">
            <label>Node Log ({liveLog.length})</label>
            <pre>{liveLog.slice(-10).map(l => `${l.ts} ${l.node} → [${(l.signals||[]).join(',')}]`).join('\n')}</pre>
          </div>
          {liveLog.length > 0 && liveLog[liveLog.length-1].data && (
            <div className="section"><label>Last Output</label><pre>{JSON.stringify(liveLog[liveLog.length-1].data, null, 1)}</pre></div>
          )}
        </>) : cycle ? (<>
          <div className="section">
            <h3>Cycle {cycleIdx+1}/{logCycles.length}</h3>
            <label>Time</label><span>{cycle.timestamp}</span>
            <label>Duration</label><span>{cycle.stats.duration}</span>
            <label>Conclusion</label><span style={{color: cycle.stats.conclusion==='EXECUTE'?'#22c55e':cycle.stats.conclusion==='DONE'?'#06b6d4':'#f59e0b'}}>{cycle.stats.conclusion}</span>
            <label>Tokens</label><span>p={cycle.stats.prompt} ctx={cycle.stats.ctx} r={cycle.stats.resp} reas={cycle.stats.reas}</span>
          </div>
          <div className="section"><label>Actions</label><pre>{JSON.stringify(cycle.stats.actions, null, 1)}</pre></div>
          <div className="section"><label>Reasoning</label><pre>{cycle.response.reasoning || '(none)'}</pre></div>
        </>) : selectedNode ? (<>
          <div className="section">
            <h3>{selectedNode.data.id}</h3>
            <label>Type</label><span>{selectedNode.data.type}</span>
            <label>Label</label><span>{selectedNode.data.label}</span>
          </div>
          {wiring && selectedNode.data.type === 'response_pipeline' && (
            <div className="section"><label>Pipeline</label><pre>{JSON.stringify(wiring.response?.unified?.pipeline, null, 1)}</pre></div>
          )}
          {wiring && selectedNode.data.type === 'request_assembly' && (
            <div className="section"><label>User Blocks</label><pre>{JSON.stringify(wiring.request?.unified?.user?.blocks, null, 1)}</pre></div>
          )}
          {wiring && selectedNode.data.type === 'gate' && (
            <div className="section"><label>Check</label><pre>{selectedNode.data.check || 'response_limit'}</pre></div>
          )}
        </>) : (
          <div className="section"><h3>Inspector</h3><span style={{color:'#64748b'}}>Load wiring → 🚀 Run or ⏩ Step</span></div>
        )}
      </div>

      <div className="timeline">
        <h3>Replay Timeline {logCycles.length > 0 && `(${logCycles.length} cycles)`}</h3>
        <div className="controls">
          <button onClick={() => setCycleIdx(i => Math.max(0, i-1))}>⏮ Prev</button>
          <button className={playing?'active':''} onClick={() => setPlaying(!playing)}>{playing ? '⏸ Pause' : '▶ Play'}</button>
          <button onClick={() => setCycleIdx(i => Math.min(logCycles.length-1, i+1))}>Next ⏭</button>
          <span>{cycleIdx >= 0 ? `Cycle ${cycleIdx+1}` : 'No log'}</span>
        </div>
        <div className="cycles">
          {logCycles.map((c, i) => (
            <div key={i} className={`cycle-bar${i===cycleIdx?' active':''}`} onClick={() => setCycleIdx(i)}>
              <span className="verdict">{c.stats.conclusion === 'EXECUTE' ? '⚡' : c.stats.conclusion === 'DONE' ? '✓' : '?'}</span>
              <span>{c.stats.duration}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Root() { return <ReactFlowProvider><App/></ReactFlowProvider>; }
createRoot(document.getElementById('root')).render(<Root/>);
</script>
