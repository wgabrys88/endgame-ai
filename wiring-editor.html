<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>endgame-ai</title>
<script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<script src="https://unpkg.com/lodash@4.17.21/lodash.min.js"></script>
<script src="https://unpkg.com/cytoscape-edgehandles@4.0.1/cytoscape-edgehandles.js"></script>
<style>
  :root{color-scheme:only dark;--bg:#06080d;--panel:#0a0f1a;--line:#1a2744;--neon:#00e5ff;--green:#39ff14;--text:#e0e6ed;--muted:#5a6a7a}
  *{margin:0;padding:0;box-sizing:border-box;color:inherit}
  html,body{height:100dvh;overflow:hidden;font:13px system-ui,sans-serif;background:var(--bg);color:var(--text)}
  body{display:grid;grid-template:"bar bar" 2.2rem "cy log" 1fr / 1fr min(18rem,30vw)}
  @media(max-width:600px){body{grid-template:"bar" 2.2rem "cy" 1fr "log" 30dvh / 1fr}}

  nav{grid-area:bar;display:flex;align-items:center;gap:.3rem;padding:0 .5rem;background:var(--panel);border-bottom:1px solid var(--line);
    & h1{color:var(--neon);font-size:.7rem;text-shadow:0 0 6px var(--neon);white-space:nowrap}
    & button{padding:.2rem .4rem;border:1px solid var(--line);border-radius:.2rem;background:var(--bg);color:var(--text);font-size:.6rem;cursor:pointer;&:hover{border-color:var(--neon);color:var(--neon);text-shadow:0 0 3px var(--neon)}}
    & .sp{flex:1}
    & #st{font-size:.55rem;color:var(--muted);max-width:20rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  }
  #cy{grid-area:cy;min-height:0;background:var(--bg)}
  #log{grid-area:log;background:var(--panel);border-inline-start:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;
    & header{padding:.3rem .4rem;font:.5rem system-ui;color:var(--neon);border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.04em;display:flex;justify-content:space-between;align-items:center;
      & button{font-size:.45rem;padding:.1rem .3rem;border:1px solid var(--line);border-radius:.15rem;background:var(--bg);color:var(--muted);cursor:pointer;&:hover{color:var(--neon);border-color:var(--neon)}}
    }
    & #logB{flex:1;min-height:0;overflow-y:auto;padding:.3rem .4rem;font:.5rem/1.5 ui-monospace,monospace;color:#7a8a9a;scrollbar-color:var(--line) transparent;
      & .n{color:var(--text);font-weight:600} & .s{color:var(--neon)} & .d{color:#9ab;display:block;margin-left:.6rem;word-break:break-all}
    }
  }
  #ins[popover]{position:fixed;inset:2.2rem 0 0 auto;width:min(20rem,38vw);margin:0;border:0;border-left:1px solid var(--line);background:var(--panel);color:var(--text);padding:.5rem;overflow-y:auto;font-size:.58rem;scrollbar-color:var(--line) transparent;
    &::backdrop{background:transparent}
    & label{display:block;color:var(--neon);font-size:.45rem;margin-top:.35rem;text-transform:uppercase;letter-spacing:.03em}
    & input,& textarea{width:100%;padding:.2rem .3rem;border:1px solid var(--line);border-radius:.15rem;background:var(--bg);color:var(--text);font:.5rem/1.3 ui-monospace,monospace;resize:vertical;appearance:none;outline:none;&:focus{border-color:var(--neon);box-shadow:0 0 3px var(--neon)}}
    & textarea{min-height:2.5rem}
    & .io{background:var(--bg);border:1px solid var(--line);border-radius:.15rem;padding:.2rem .3rem;font:.45rem/1.3 ui-monospace,monospace;color:#7a8a9a;max-height:7rem;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
    & .blk{padding:.1rem .2rem;border:1px solid var(--line);border-radius:.1rem;margin-bottom:.1rem;font-size:.45rem;& span{color:var(--muted)}}
    & .acts{display:flex;gap:.3rem;margin-top:.4rem;& button{padding:.15rem .4rem;border:1px solid var(--line);border-radius:.15rem;background:var(--bg);color:var(--neon);font-size:.5rem;cursor:pointer;&:hover{border-color:var(--neon);box-shadow:0 0 3px var(--neon)}}}
  }
  #err{position:fixed;top:2.2rem;left:0;right:0;z-index:99;padding:.25rem .4rem;background:#1a0505;border-bottom:1px solid #ff1744;color:#ff8a80;font-size:.55rem;display:none}
</style>
</head>
<body>
<nav>
  <h1>⚡ endgame</h1>
  <button id="bStep">Step</button><button id="bRun">Run</button><button id="bStop">Stop</button><button id="bLayout">Layout</button><button id="bSave">Save</button>
  <span class="sp"></span><span id="st">…</span>
</nav>
<div id="cy"></div>
<aside id="log"><header>log<button id="bClr">clear</button></header><div id="logB"></div></aside>
<div id="ins" popover="manual"></div>
<div id="err"></div>
<script>
// Extensions auto-register via window.cytoscape detection
const S=location.origin,$=id=>document.getElementById(id),esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
let W,cy,eh,sel,liveNode,liveState,liveRun,lastIO={},logs=[];

const NEONS=['#00e5ff','#7c4dff','#1de9b6','#ff6d00','#00e676','#d500f9','#ffab00','#2979ff','#76ff03','#f50057','#00bcd4','#651fff'];
const tc={};const neon=t=>(tc[t]??=NEONS[Object.keys(tc).length%NEONS.length]);

// --- Build Cytoscape ---
function buildGraph(w){
  const elements=[];
  for(const n of w.topology.nodes) elements.push({data:{id:n.id,label:n.id,type:n.type||'',ncolor:neon(n.type||'?')}});
  for(const e of w.topology.edges) elements.push({data:{id:`${e.from}-${e.on||'*'}-${e.to}`,source:e.from,target:e.to,label:e.on||''}});

  cy=cytoscape({
    container:$('cy'),
    elements,
    style:[
      {selector:'node',style:{'background-color':'#0f172a','border-width':2,'border-color':'data(ncolor)','label':'data(label)','color':'#e0e6ed','font-size':'9px','text-valign':'center','text-halign':'center','width':110,'height':36,'shape':'roundrectangle','text-wrap':'ellipsis','text-max-width':'100px'}},
      {selector:'node:active',style:{'overlay-opacity':0}},
      {selector:'node.active',style:{'border-color':'#39ff14','border-width':3,'shadow-blur':'12','shadow-color':'#39ff14','shadow-opacity':0.5}},
      {selector:'node.sel',style:{'border-color':'#00e5ff','border-width':3,'border-style':'dashed'}},
      {selector:'edge',style:{'width':1.5,'line-color':'#0e7490','target-arrow-color':'#00e5ff','target-arrow-shape':'triangle','curve-style':'taxi','taxi-direction':'rightward','taxi-turn':'50px','label':'data(label)','font-size':'7px','color':'#5a6a7a','text-rotation':'autorotate','text-margin-y':-8}},
      {selector:'edge.active',style:{'line-color':'#39ff14','target-arrow-color':'#39ff14','width':2.5}},
      {selector:'.eh-handle',style:{'background-color':'#00e5ff','width':8,'height':8,'shape':'ellipse','overlay-opacity':0}},
      {selector:'.eh-preview,.eh-ghost-edge',style:{'line-color':'#00e5ff','target-arrow-color':'#00e5ff','opacity':0.6}}
    ],
    layout:{name:'dagre',rankDir:'LR',nodeSep:30,rankSep:80,edgeSep:12},
    wheelSensitivity:0.3,
    minZoom:0.3,maxZoom:3
  });

  // Edgehandles for drag-to-connect
  eh=cy.edgehandles({hoverDelay:100,snap:true,noEdgeEventsInDraw:true,
    complete:(src,tgt)=>{
      const on=prompt('Signal label (e.g. ready):','*');
      if(!on){cy.remove(cy.edges().last());return;}
      const e={from:src.id(),to:tgt.id(),on};
      W.topology.edges.push(e);
      cy.edges().last().data('label',on);
      logMsg('wire',`+edge`,`${e.from} →[${on}]→ ${e.to}`);
    }
  });

  // Click to inspect
  cy.on('tap','node',e=>{inspect(e.target.id());});
  cy.on('tap',e=>{if(e.target===cy){hideInspect();sel=null;cy.nodes().removeClass('sel');}});

  status(`${w.topology.nodes.length} nodes · ${w.topology.edges.length} edges · scroll=zoom · drag=move`);
}

function runLayout(){cy.layout({name:'dagre',rankDir:'LR',nodeSep:30,rankSep:80,edgeSep:12,animate:true,animationDuration:300}).run();}

// --- Inspector ---
function inspect(id){
  sel=id;cy.nodes().removeClass('sel');cy.$id(id).addClass('sel');
  const nd=W.topology.nodes.find(n=>n.id===id);if(!nd)return;
  const blk=nd.prompt?.user?.blocks||[],io=lastIO[id]||{};
  let h=`<label>id</label><input value="${esc(id)}" readonly>`;
  h+=`<label>type</label><input id="iT" value="${esc(nd.type||'')}">`;
  h+=`<label>label</label><input id="iL" value="${esc(nd.label||'')}">`;
  h+=`<label>role (${esc(nd.prompt?.role||'–')})</label><textarea id="iR" placeholder="prompt text">${esc('')}</textarea>`;
  h+=`<label>input blocks</label>`;
  h+=blk.map(b=>`<div class="blk"><b>${esc(b.label)}</b> <span>← ${esc(b.source)}</span></div>`).join('')||'<div class="blk" style="color:var(--muted)">none</div>';
  h+=`<label>last input → node</label><div class="io">${esc(io.i||'—')}</div>`;
  h+=`<label>node output →</label><div class="io">${esc(io.o||'—')}</div>`;
  h+=`<div class="acts"><button onclick="applyInspect()">Apply</button><button onclick="delNode()">Delete</button><button onclick="hideInspect()">Close</button></div>`;
  $('ins').innerHTML=h;$('ins').showPopover();
}
function hideInspect(){$('ins').hidePopover();}
window.applyInspect=()=>{
  if(!sel)return;const nd=W.topology.nodes.find(n=>n.id===sel);if(!nd)return;
  const t=$('iT')?.value,l=$('iL')?.value;
  if(t)nd.type=t; if(l)nd.label=l;
  cy.$id(sel).data('label',l||sel).data('type',t).data('ncolor',neon(t));
  status(`applied → ${sel}`);
};
window.delNode=()=>{
  if(!sel||!confirm(`Delete ${sel}?`))return;
  W.topology.nodes=W.topology.nodes.filter(n=>n.id!==sel);
  W.topology.edges=W.topology.edges.filter(e=>e.from!==sel&&e.to!==sel);
  cy.remove(cy.$id(sel));hideInspect();sel=null;
  logMsg('edit','delete',sel);
};
window.hideInspect=hideInspect;

// --- Glow ---
function glow(id){
  cy.nodes().removeClass('active');cy.edges().removeClass('active');
  if(!id)return;
  cy.$id(id).addClass('active');
  cy.edges().filter(e=>e.target().id()===id).addClass('active');
}

// --- Log ---
function logMsg(n,sig,detail){
  logs.push({t:new Date().toLocaleTimeString(),n,sig,d:detail||''});
  $('logB').innerHTML=logs.slice(-40).map(l=>`<div><span class="n">${esc(l.n)}</span> <span class="s">[${esc(l.sig)}]</span>${l.d?`<span class="d">${esc(l.d)}</span>`:''}</div>`).join('');
  $('logB').scrollTop=$('logB').scrollHeight;
}
function status(t){$('st').textContent=t;}
function err(t){$('err').style.display='block';$('err').textContent=t;}

// --- API ---
const nd=id=>W.topology.nodes.find(n=>n.id===id);
const next=(from,sigs)=>W.topology.edges.filter(e=>e.from===from&&(e.on==='*'||(e.on||'').split('|').some(s=>sigs.includes(s)))).map(e=>e.to)[0]||null;
async function callNode(id,state){
  const type=nd(id)?.type||'?';
  const r=await(await fetch(`${S}/node/${type}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({state})})).json();
  lastIO[id]={i:JSON.stringify(state,null,1),o:JSON.stringify(r,null,1)};
  if(id===sel)inspect(id);
  return r;
}
function detail(sp){
  if(sp.plan)return'plan: '+sp.plan.map(p=>p.description).join(' → ');
  if(sp.step_goal)return`goal: "${sp.step_goal}"`;
  if(sp.reasoning?.last)return sp.reasoning.last.slice(0,180);
  return'';
}

// --- Run engine ---
function needGoal(){
  if(liveState)return true;
  const g=prompt('Goal:');if(!g)return false;
  liveState={goal:g,step:0,retries:0,history:[],reasoning:{},reasoning_chain:[],planner_retries:0,replan_count:0,last_error:'',no_desktop:false};
  liveNode=W.topology.cycle_start;glow(liveNode);logMsg('–','start',`goal: "${g}"`);
  return true;
}
async function advance(){
  if(!liveNode)return false;
  const id=liveNode;glow(id);status(`⏳ ${id}…`);
  const r=await callNode(id,liveState);
  liveState={...liveState,...r.state_patch};
  const s=r.signals||[];
  liveNode=next(id,s);
  logMsg(id,s.join(','),detail(r.state_patch||{}));
  status(`${id} → [${s}]${liveNode?' → '+liveNode:' (end)'}`);
  glow(liveNode);
  return!!(liveNode&&!s.includes('idle')&&!liveState.satisfied);
}
async function step(){if(!needGoal()||!liveNode)return;try{await advance();}catch(e){err(e.message);}}
async function run(){if(!needGoal())return;liveRun=true;try{while(liveRun&&liveNode){if(!await advance())break;await new Promise(r=>setTimeout(r,300));}}catch(e){err(e.message);}liveRun=false;status('done');}
async function save(){
  // Sync positions back
  for(const n of W.topology.nodes){const pos=cy.$id(n.id).position();n._pos={x:Math.round(pos.x),y:Math.round(pos.y)};}
  const r=await fetch(`${S}/wiring`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(W)});
  const d=await r.json();
  if(!r.ok||d.error){err(d.details?.join('; ')||d.error);return;}
  $('err').style.display='none';status(`saved ${d.nodes} nodes`);
}

// --- SSE ---
const sse=new EventSource(`${S}/events`);
sse.addEventListener('node',e=>{const d=JSON.parse(e.data);glow(d.id);status(`auto: ${d.id}`);});
sse.addEventListener('result',e=>{const d=JSON.parse(e.data);logMsg(d.id,(d.s||[]).join(','),'');});
sse.addEventListener('stop',()=>{glow(null);status('done');});

// --- Buttons ---
$('bStep').onclick=step;
$('bRun').onclick=run;
$('bStop').onclick=()=>{liveRun=false;status('stopped');glow(null);};
$('bLayout').onclick=runLayout;
$('bSave').onclick=save;
$('bClr').onclick=()=>{logs=[];$('logB').innerHTML='';};

// --- Init ---
(async()=>{
  try{
    W=await(await fetch(`${S}/wiring`)).json();
    buildGraph(W);
  }catch(e){err(e.message);status('offline');}
})();
</script>
</body>
</html>
