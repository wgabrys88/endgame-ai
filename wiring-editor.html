<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>endgame-ai workbench</title>
<style>
:root{
  --bg:#090a0c;--panel:#111419;--panel2:#0d1014;--panel3:#171b22;
  --line:#2e3540;--line2:#4a5361;--txt:#e8edf2;--muted:#9aa6b2;
  --cyan:#47c7d7;--green:#59d379;--red:#ff6565;--amber:#efb54a;--violet:#b28cff;--blue:#7aa7ff;
  --mono:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",monospace;
}
*{box-sizing:border-box} html,body{height:100dvh;margin:0;overflow:hidden;background:var(--bg);color:var(--txt);font:13px/1.45 system-ui,Segoe UI,Arial,sans-serif}
button,input,select,textarea{font:inherit} button{border:1px solid var(--line2);background:#171b22;color:var(--txt);border-radius:6px;padding:6px 10px;cursor:pointer;min-height:30px} button:hover{border-color:var(--cyan);color:var(--cyan)} button.primary{border-color:var(--cyan);color:var(--cyan)} button.good{border-color:var(--green);color:var(--green)} button.warn{border-color:var(--amber);color:var(--amber)} button.danger{border-color:var(--red);color:var(--red)} button:disabled{opacity:.45;cursor:not-allowed}
input,select,textarea{border:1px solid var(--line);background:#080a0e;color:var(--txt);border-radius:6px;padding:6px 8px;outline:none;min-width:0} input:focus,select:focus,textarea:focus{border-color:var(--cyan)} textarea{resize:none;font:12px/1.45 var(--mono)}
.app{height:100dvh;display:grid;grid-template-rows:auto 1fr;min-width:0}.top{display:flex;align-items:center;gap:7px;padding:8px 10px;border-bottom:1px solid var(--line);background:var(--panel);min-width:0}.brand{font-weight:800;color:var(--cyan);white-space:nowrap;letter-spacing:.2px}.goal{flex:1;min-width:160px}.status{font:11px var(--mono);color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:38ch}.main{min-height:0;display:grid;grid-template-columns:minmax(245px,310px) minmax(520px,1fr) minmax(320px,430px)}
.rail,.inspect{min-height:0;background:var(--panel2);display:flex;flex-direction:column}.rail{border-right:1px solid var(--line)}.inspect{border-left:1px solid var(--line)}.center{min-height:0;display:grid;grid-template-rows:auto minmax(300px,1fr) minmax(150px,24vh);background:#07080a}.bar{display:flex;align-items:center;gap:6px;padding:7px 8px;border-bottom:1px solid var(--line);background:#101319;min-width:0}.bar h2{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:0;margin-right:auto;white-space:nowrap}.pane{min-height:0;overflow:auto;padding:8px}.box{border:1px solid var(--line);background:var(--panel);border-radius:8px;overflow:hidden;margin-bottom:8px}.box h3{margin:0;padding:7px 9px;border-bottom:1px solid var(--line);font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:.4px}.box .body{padding:8px}.kv{display:grid;grid-template-columns:94px minmax(0,1fr);gap:4px 8px;font:11px var(--mono)}.kv b{color:var(--muted);font-weight:500}.kv span{overflow-wrap:anywhere;white-space:pre-wrap}.list{display:flex;flex-direction:column;gap:5px}.item{border:1px solid var(--line);background:#0b0e13;border-radius:6px;padding:6px 7px;font:11px var(--mono);cursor:pointer;overflow-wrap:anywhere}.item:hover,.item.sel{border-color:var(--cyan)}.item.active{border-color:var(--green);color:var(--green)}.item.bad{border-color:var(--red);color:var(--red)}.itemHead{display:flex;align-items:center;gap:5px;min-width:0}.itemHead span:first-child{flex:1;overflow-wrap:anywhere}.pill{display:inline-block;border:1px solid var(--line2);border-radius:999px;padding:1px 6px;font:10px var(--mono);color:var(--muted);white-space:nowrap}.pill.green{border-color:var(--green);color:var(--green)}.pill.red{border-color:var(--red);color:var(--red)}.pill.amber{border-color:var(--amber);color:var(--amber)}.pill.cyan{border-color:var(--cyan);color:var(--cyan)}.muted{color:var(--muted)}.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}.cyan{color:var(--cyan)}.code{font:11px/1.45 var(--mono);white-space:pre-wrap;overflow-wrap:anywhere}.log{font:11px/1.45 var(--mono);white-space:pre-wrap;overflow:auto;background:#080a0d}.split{display:grid;grid-template-columns:1fr 1fr;gap:8px;min-height:0}
#graphWrap{min-height:0;position:relative;overflow:hidden;background:radial-gradient(circle at 20px 20px,#111721 1px,transparent 1px) 0 0/24px 24px,#07080a}#graph{width:100%;height:100%;display:block;touch-action:none;user-select:none}.edgePath{stroke:#68717f;stroke-width:1.5;fill:none;marker-end:url(#arrow)}.edgePath.sel{stroke:var(--cyan);stroke-width:2.3}.edgePath.bad{stroke:var(--red);stroke-dasharray:4 3}.edgeLabel{font:10px var(--mono);fill:var(--muted);paint-order:stroke;stroke:#07080a;stroke-width:4;stroke-linejoin:round;cursor:pointer}.edgeLabel.sel{fill:var(--cyan)}.node rect{fill:#151920;stroke:var(--line2);stroke-width:1.3;rx:10}.node text{font:12px var(--mono);fill:var(--txt);pointer-events:none}.node .sub{fill:var(--muted);font-size:10px}.node .handle{stroke:#071014;stroke-width:2;cursor:crosshair}.node .in{fill:var(--blue)}.node .out{fill:var(--amber)}.node.entry rect{stroke:var(--cyan)}.node.planner rect{stroke:var(--violet)}.node.observe rect{stroke:var(--green)}.node.act rect{stroke:var(--amber)}.node.verify rect{stroke:var(--blue)}.node.reflect rect{stroke:#ff8b65}.node.self_modify rect{stroke:var(--violet);stroke-dasharray:5 3}.node.satisfied rect{stroke:var(--green);stroke-dasharray:3 2}.node.sel rect{stroke:var(--cyan);stroke-width:2.4}.node.active rect{stroke:var(--green);stroke-width:2.7}.node.missing rect{stroke:var(--red);stroke-dasharray:4 3}.ghost{stroke:var(--cyan);stroke-width:1.8;fill:none;stroke-dasharray:5 4;marker-end:url(#arrow)}.tabs{display:flex;border-bottom:1px solid var(--line);background:#101319}.tab{padding:8px 10px;border-right:1px solid var(--line);font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);cursor:pointer}.tab.on{color:var(--cyan);background:#0b0e13}.form{display:grid;grid-template-columns:82px minmax(0,1fr);gap:6px;align-items:center}.form label{color:var(--muted);font:11px var(--mono)}.row{display:flex;gap:6px;align-items:center}.row>*{min-width:0}.jsonArea{width:100%;height:100%;min-height:520px}.codeArea{width:100%;height:300px;min-height:260px}.mini{padding:4px 7px;min-height:24px;font-size:11px}.dirty::after{content:" *";color:var(--amber)}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">endgame-ai</div>
    <input id="goal" class="goal" placeholder="Goal for /run or /step" aria-label="Goal">
    <button id="stepBtn" class="primary">Step</button>
    <button id="runBtn" class="good">Run</button>
    <button id="pauseBtn" class="warn">Pause</button>
    <button id="resumeBtn">Resume</button>
    <button id="stopBtn" class="danger">Stop</button>
    <button id="copyCodeBtn">Copy codebase</button>
    <button id="saveBtn" class="primary">Save Wiring</button>
    <span id="status" class="status">loading</span>
  </header>
  <section class="main">
    <aside class="rail">
      <div class="bar"><h2>Runtime</h2><button id="reloadBtn" class="mini">Reload</button></div>
      <div class="pane">
        <div class="box"><h3>Run</h3><div class="body kv" id="runBox"></div></div>
        <div class="box"><h3>System</h3><div class="body kv" id="systemBox"></div></div>
        <div class="box"><h3>Nodes</h3><div class="body list" id="nodeList"></div></div>
        <div class="box"><h3>Edges</h3><div class="body list" id="edgeList"></div></div>
        <div class="box"><h3>Plan</h3><div class="body list" id="planList"></div></div>
        <div class="box"><h3>History</h3><div class="body list" id="historyList"></div></div>
      </div>
    </aside>
    <main class="center">
      <div class="bar">
        <h2>Graph wiring</h2>
        <button id="autoLayoutBtn">Auto Layout</button>
        <button id="fitBtn">Fit</button>
        <button id="zoomOutBtn">-</button>
        <button id="zoomInBtn">+</button>
        <button id="addNodeBtn">+ Node</button>
        <button id="addEdgeBtn">+ Edge</button>
        <button id="deleteBtn" class="danger">Delete</button>
        <span id="graphStatus" class="status">drag node handles to wire</span>
      </div>
      <div id="graphWrap"><svg id="graph" role="img" aria-label="Endgame wiring graph"></svg></div>
      <div class="split">
        <div class="box" style="margin:8px 0 8px 8px"><h3>Screen</h3><div class="body code" id="screenBox"></div></div>
        <div class="box" style="margin:8px 8px 8px 0"><h3>Event stream</h3><div class="body log" id="eventLog"></div></div>
      </div>
    </main>
    <aside class="inspect">
      <div class="tabs">
        <div class="tab on" data-tab="inspect">Inspect</div>
        <div class="tab" data-tab="code">Node Code</div>
        <div class="tab" data-tab="json">JSON</div>
        <div class="tab" data-tab="state">State</div>
      </div>
      <div class="pane" id="tabInspect"></div>
      <div class="pane" id="tabCode" hidden></div>
      <div class="pane" id="tabJson" hidden><textarea id="jsonEdit" class="jsonArea"></textarea></div>
      <div class="pane" id="tabState" hidden><pre class="code" id="stateBox"></pre></div>
    </aside>
  </section>
</div>
<script>
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
let wiring=null,state=null,health=null,selected={kind:null},currentNode=null,dirty=false,jsonDirty=false;
let view={x:0,y:0,w:1200,h:760},drag=null,linkDrag=null,pan=null,tempPoint=null;
const NODE_W=168,NODE_H=66;
function log(x){const el=$('eventLog'); const line=typeof x==='string'?x:JSON.stringify(x,null,2); el.textContent+=line+'\n'; el.scrollTop=el.scrollHeight;}
async function api(path,opts={}){const r=await fetch(path,{headers:{'Content-Type':'application/json'},...opts}); const t=await r.text(); let data; try{data=JSON.parse(t)}catch{data=t} if(!r.ok)throw new Error((data&&data.error)||t||r.status); return data;}
async function post(path,obj={}){return api(path,{method:'POST',body:JSON.stringify(obj)});}
function setDirty(v=true){dirty=v;$('saveBtn').classList.toggle('dirty',dirty); setStatus(v?'unsaved wiring changes':'ok');}
function setStatus(s){$('status').textContent=s;}
function topo(){return wiring?.topology||(wiring.topology={nodes:[],edges:[]});}
function nodes(){return topo().nodes||(topo().nodes=[]);} function edges(){return topo().edges||(topo().edges=[]);} function nodeById(id){return nodes().find(n=>n.id===id);} function edgeKey(e){return `${e.from}|${e.to}|${e.on}`;}
function layout(){const t=topo(); t.layout=t.layout||{}; t.layout.positions=t.layout.positions||{}; return t.layout.positions;}
function pos(id){const l=layout(); if(!l[id]) l[id]={x:80+Object.keys(l).length*30,y:80+Object.keys(l).length*30}; return l[id];}
function nodeCenter(id){const p=pos(id); return {x:p.x+NODE_W/2,y:p.y+NODE_H/2};}
function port(id,side){const p=pos(id); return side==='out'?{x:p.x+NODE_W,y:p.y+NODE_H/2}:{x:p.x,y:p.y+NODE_H/2};}
function pathForEdge(e){const a=port(e.from,'out'), b=port(e.to,'in'); if(e.from===e.to){const p=pos(e.from), x=p.x+NODE_W, y=p.y+14; return `M ${x} ${y} C ${x+80} ${y-70}, ${p.x+NODE_W/2} ${p.y-90}, ${p.x+NODE_W/2} ${p.y}`;} const dx=Math.max(70,Math.abs(b.x-a.x)*0.45); return `M ${a.x} ${a.y} C ${a.x+dx} ${a.y}, ${b.x-dx} ${b.y}, ${b.x} ${b.y}`;}
function ensureLayout(){const ids=nodes().map(n=>n.id); const l=layout(); ids.forEach(id=>pos(id)); for(const k of Object.keys(l)){if(!ids.includes(k)) delete l[k];}}
function autoLayout(){const order=nodes().map(n=>n.id), indeg=Object.fromEntries(order.map(id=>[id,0])); edges().forEach(e=>{if(indeg[e.to]!=null&&e.from!==e.to)indeg[e.to]++}); const levels={}, q=order.filter(id=>indeg[id]===0); if(!q.length&&order.length)q.push(order[0]); q.forEach(id=>levels[id]=0); let iters=0; const maxIters=order.length*order.length; while(q.length&&iters++<maxIters){const id=q.shift(); edges().filter(e=>e.from===id&&e.to!==id).forEach(e=>{const nl=(levels[id]||0)+1; if((levels[e.to]==null||nl>levels[e.to])&&nl<order.length){levels[e.to]=nl;q.push(e.to)}})} order.forEach(id=>{if(levels[id]==null)levels[id]=0}); const buckets={}; order.forEach(id=>(buckets[levels[id]]||(buckets[levels[id]]=[])).push(id)); const l=layout(); Object.entries(buckets).forEach(([lev,ids])=>ids.forEach((id,i)=>{l[id]={x:70+Number(lev)*230,y:70+i*110}})); fitGraph(); setDirty(true); renderAll();}
function fitGraph(){ensureLayout(); const ps=nodes().map(n=>pos(n.id)); if(!ps.length)return; const minX=Math.min(...ps.map(p=>p.x))-80,minY=Math.min(...ps.map(p=>p.y))-80,maxX=Math.max(...ps.map(p=>p.x+NODE_W))+120,maxY=Math.max(...ps.map(p=>p.y+NODE_H))+120; view={x:minX,y:minY,w:Math.max(700,maxX-minX),h:Math.max(420,maxY-minY)}; renderGraph();}
function zoom(f){const cx=view.x+view.w/2,cy=view.y+view.h/2; view.w*=f; view.h*=f; view.x=cx-view.w/2; view.y=cy-view.h/2; renderGraph();}
function svgPoint(evt){const svg=$('graph'); const pt=svg.createSVGPoint(); pt.x=evt.clientX; pt.y=evt.clientY; return pt.matrixTransform(svg.getScreenCTM().inverse());}
function select(kind,id,index){selected={kind,id,index}; if(kind==='node')currentNode=id; renderAll(); if(kind==='node')loadNodeCode(nodeById(id)?.type);}
function renderGraph(){if(!wiring)return; ensureLayout(); const svg=$('graph'); svg.setAttribute('viewBox',`${view.x} ${view.y} ${view.w} ${view.h}`); let html=`<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#68717f"/></marker></defs>`; edges().forEach((e,i)=>{const bad=!nodeById(e.from)||!nodeById(e.to); const sel=selected.kind==='edge'&&selected.index===i; const c=nodeCenter(e.from||''); const d=nodeCenter(e.to||''); const labelX=(c.x+d.x)/2, labelY=(c.y+d.y)/2-6; html+=`<path class="edgePath ${sel?'sel':''} ${bad?'bad':''}" data-edge="${i}" d="${pathForEdge(e)}"></path><text class="edgeLabel ${sel?'sel':''}" data-edge="${i}" x="${labelX}" y="${labelY}">${esc(e.on||'')}</text>`;}); if(linkDrag&&tempPoint){const a=port(linkDrag.from,'out'), b=tempPoint; const dx=Math.max(70,Math.abs(b.x-a.x)*.45); html+=`<path class="ghost" d="M ${a.x} ${a.y} C ${a.x+dx} ${a.y}, ${b.x-dx} ${b.y}, ${b.x} ${b.y}"></path>`;} nodes().forEach(n=>{const p=pos(n.id); const type=n.type||'unknown'; const sel=selected.kind==='node'&&selected.id===n.id; const active=currentNode===n.id; html+=`<g class="node ${esc(type)} ${sel?'sel':''} ${active?'active':''}" data-node="${esc(n.id)}" transform="translate(${p.x},${p.y})"><rect width="${NODE_W}" height="${NODE_H}"></rect><circle class="handle in" data-in="${esc(n.id)}" cx="0" cy="${NODE_H/2}" r="7"></circle><circle class="handle out" data-out="${esc(n.id)}" cx="${NODE_W}" cy="${NODE_H/2}" r="7"></circle><text x="14" y="24">${esc(n.id)}</text><text class="sub" x="14" y="43">${esc(type)}</text><text class="sub" x="14" y="58">${esc((n.label||'').slice(0,24))}</text></g>`;}); svg.innerHTML=html;}
function renderLists(){const nl=$('nodeList'); nl.innerHTML=nodes().map(n=>`<div class="item ${selected.kind==='node'&&selected.id===n.id?'sel':''} ${currentNode===n.id?'active':''}" data-nodeitem="${esc(n.id)}"><div class="itemHead"><span>${esc(n.id)}</span><span class="pill">${esc(n.type)}</span></div><span class="muted">${esc(n.label||'')}</span></div>`).join('')||'<span class="muted">no nodes</span>'; const el=$('edgeList'); el.innerHTML=edges().map((e,i)=>`<div class="item ${selected.kind==='edge'&&selected.index===i?'sel':''}" data-edgeitem="${i}"><div>${esc(e.from)} <span class="cyan">--${esc(e.on)}--></span> ${esc(e.to)}</div></div>`).join('')||'<span class="muted">no edges</span>'; nl.querySelectorAll('[data-nodeitem]').forEach(x=>x.onclick=()=>select('node',x.dataset.nodeitem)); el.querySelectorAll('[data-edgeitem]').forEach(x=>x.onclick=()=>select('edge',null,Number(x.dataset.edgeitem)));}
function renderState(){const run=health?.run||{}; $('runBox').innerHTML=kv({running:run.running,paused:run.paused,last_error:run.last_error||'',resume:state?._resume_node||'',cycle:state?._cycle||0}); $('systemBox').innerHTML=kv({port:health?.port||'',wiring:health?.wiring?.path||'',nodes:nodes().length,edges:edges().length,cycle_start:topo().cycle_start||''}); $('stateBox').textContent=JSON.stringify(state||{},null,2); $('screenBox').textContent=state?.screen||'(no screen observation yet)'; const plan=state?.plan||[]; const cur=Number(state?.step||0); $('planList').innerHTML=plan.map((s,i)=>`<div class="item ${i===cur?'active':''}">${i+1}. ${esc(s.description||s)}<br><span class="muted">${esc(s.done_when||'')}</span></div>`).join('')||'<span class="muted">no plan</span>'; const hist=state?.history||[]; $('historyList').innerHTML=hist.slice(-10).reverse().map(h=>`<div class="item ${String(h.outcome||'').startsWith('FAILED')?'bad':''}"><b>${esc(h.action||'')}</b><br><span class="muted">${esc(h.outcome||'')}</span></div>`).join('')||'<span class="muted">no history</span>';}
function kv(obj){return Object.entries(obj).map(([k,v])=>`<b>${esc(k)}</b><span>${esc(typeof v==='object'?JSON.stringify(v):v)}</span>`).join('');}
function renderInspect(){const root=$('tabInspect'); if(selected.kind==='node'){const n=nodeById(selected.id); if(!n){root.innerHTML='<p class="red">missing node</p>';return;} const incoming=edges().filter(e=>e.to===n.id), outgoing=edges().filter(e=>e.from===n.id); root.innerHTML=`<div class="box"><h3>Node</h3><div class="body form"><label>id</label><input id="editNodeId" value="${esc(n.id)}"><label>type</label><input id="editNodeType" value="${esc(n.type||'')}"><label>label</label><input id="editNodeLabel" value="${esc(n.label||'')}"><label>circuit</label><input id="editNodeCircuit" value="${esc(n.circuit||'')}"></div><div class="body row"><button id="applyNodeBtn" class="primary">Apply node config</button><button id="stepSelectedBtn">Step this node</button></div></div><div class="box"><h3>Incoming</h3><div class="body code">${esc(incoming.map(e=>`${e.from} --${e.on}--> ${e.to}`).join('\n')||'none')}</div></div><div class="box"><h3>Outgoing</h3><div class="body code">${esc(outgoing.map(e=>`${e.from} --${e.on}--> ${e.to}`).join('\n')||'none')}</div></div>`; $('applyNodeBtn').onclick=applyNodeConfig; $('stepSelectedBtn').onclick=()=>step(n.id);}
else if(selected.kind==='edge'){const e=edges()[selected.index]; if(!e){root.innerHTML='<p class="red">missing edge</p>';return;} root.innerHTML=`<div class="box"><h3>Edge</h3><div class="body form"><label>from</label><input id="editEdgeFrom" value="${esc(e.from||'')}"><label>signal</label><input id="editEdgeOn" value="${esc(e.on||'')}"><label>to</label><input id="editEdgeTo" value="${esc(e.to||'')}"></div><div class="body"><button id="applyEdgeBtn" class="primary">Apply edge</button></div></div>`; $('applyEdgeBtn').onclick=applyEdgeConfig;}
else root.innerHTML='<p class="muted">Select a node or edge. Drag amber output handles to blue input handles to create wires.</p>'; $('jsonEdit').value=JSON.stringify(wiring||{},null,2);}
function renderAll(){renderGraph();renderLists();renderState();renderInspect();$('graphStatus').textContent=selected.kind?`${selected.kind}: ${selected.id??selected.index}`:'drag node handles to wire';}
function applyNodeConfig(){const n=nodeById(selected.id); if(!n)return; const old=n.id, id=$('editNodeId').value.trim(); if(!id)return alert('id required'); if(id!==old&&nodeById(id))return alert('node id already exists'); n.id=id;n.type=$('editNodeType').value.trim()||id;n.label=$('editNodeLabel').value.trim(); const circuit=$('editNodeCircuit').value.trim(); if(circuit)n.circuit=circuit; else delete n.circuit; if(id!==old){edges().forEach(e=>{if(e.from===old)e.from=id;if(e.to===old)e.to=id}); const l=layout(); l[id]=l[old]; delete l[old]; if(topo().cycle_start===old)topo().cycle_start=id; selected.id=id;} setDirty(true);renderAll();}
function applyEdgeConfig(){const e=edges()[selected.index]; if(!e)return; e.from=$('editEdgeFrom').value.trim(); e.on=$('editEdgeOn').value.trim(); e.to=$('editEdgeTo').value.trim(); setDirty(true);renderAll();}
async function loadNodeCode(type){if(!type)return; $('tabCode').innerHTML='<span class="muted">loading...</span>'; try{const r=await api('/node/'+encodeURIComponent(type)); $('tabCode').innerHTML=`<div class="box"><h3>${esc(type)}.py</h3><div class="body"><textarea id="nodeCode" class="codeArea">${esc(r.code||'')}</textarea></div><div class="body row"><button id="saveNodeCodeBtn" class="primary">Save node code</button><span class="muted">writes nodes/${esc(type)}.py</span></div></div>`; $('saveNodeCodeBtn').onclick=async()=>{const res=await post('/node/'+encodeURIComponent(type),{code:$('nodeCode').value}); log(res);};}catch(e){$('tabCode').innerHTML=`<p class="red">${esc(e.message)}</p>`;}}
async function loadAll(){try{health=await api('/health'); wiring=await api('/wiring'); state=await api('/state'); currentNode=state?._resume_node||health?.wiring?.cycle_start||topo().cycle_start; const hadPositions=Object.keys((wiring.topology?.layout?.positions)||{}).length; if(!hadPositions){autoLayout();} else {ensureLayout(); fitGraph();} jsonDirty=false; setDirty(false); renderAll();}catch(e){setStatus('error: '+e.message);log('load failed: '+e.message);}}
async function refreshOnly(){try{health=await api('/health'); state=await api('/state'); currentNode=state?._resume_node||currentNode; renderAll();}catch(e){log('refresh failed: '+e.message);}}
async function saveWiring(){try{const edited=$('jsonEdit').value.trim(); if(jsonDirty&&edited){wiring=JSON.parse(edited);} const r=await post('/wiring',wiring); log(r); jsonDirty=false; setDirty(false); await loadAll();}catch(e){alert(e.message);}}
async function run(){log(await post('/run',{goal:$('goal').value.trim()}));}
async function step(nodeOverride=null){const payload={goal:$('goal').value.trim()}; if(nodeOverride)payload.node=nodeOverride; const r=await post('/step',payload); log(r.transition||r); state=r.state||state; currentNode=r.next||r.node||currentNode; renderAll();}
async function copyCodebase(){const r=await post('/clipboard/codebase',{}); log(r); try{const txt=await fetch('/codebase?format=text').then(r=>r.text()); await navigator.clipboard.writeText(txt); log(`browser clipboard copy attempted: ${txt.length} chars`);}catch(e){log('browser clipboard unavailable: '+e.message);}}
function addNode(){const type=prompt('Node type / Python file name, e.g. codebase_sender'); if(!type)return; const id=prompt('Node id',type)||type; const label=prompt('Label',id)||id; post('/node/create',{type,id,label}).then(r=>{log(r);return loadAll();}).catch(e=>alert(e.message));}
function addEdgeManual(){const from=prompt('From node id', selected.kind==='node'?selected.id:''); if(!from)return; const to=prompt('To node id',''); if(!to)return; const on=prompt('Signal', 'done')||'done'; edges().push({from,to,on}); select('edge',null,edges().length-1); setDirty(true); renderAll();}
function deleteSelection(){if(selected.kind==='node'){const id=selected.id; if(!confirm(`Delete node ${id} and its edges from wiring? Node .py file is kept.`))return; topo().nodes=nodes().filter(n=>n.id!==id); topo().edges=edges().filter(e=>e.from!==id&&e.to!==id); delete layout()[id]; selected={kind:null}; setDirty(true); renderAll();} else if(selected.kind==='edge'){edges().splice(selected.index,1); selected={kind:null}; setDirty(true); renderAll();}}
$('graph').addEventListener('mousedown',evt=>{const p=svgPoint(evt); if(evt.target.dataset.edge){select('edge',null,Number(evt.target.dataset.edge));return;} const out=evt.target.dataset.out; const inn=evt.target.dataset.in; const g=evt.target.closest('.node'); if(out){linkDrag={from:out};tempPoint=p;evt.preventDefault();renderGraph();return;} if(inn){select('node',inn);return;} if(g){const id=g.dataset.node; select('node',id); const np=pos(id); drag={id,dx:p.x-np.x,dy:p.y-np.y}; evt.preventDefault(); return;} pan={x:p.x,y:p.y,vx:view.x,vy:view.y};});
$('graph').addEventListener('mousemove',evt=>{const p=svgPoint(evt); if(linkDrag){tempPoint=p;renderGraph();return;} if(drag){const np=pos(drag.id); np.x=p.x-drag.dx; np.y=p.y-drag.dy; setDirty(true);renderGraph();return;} if(pan){view.x=pan.vx-(p.x-pan.x); view.y=pan.vy-(p.y-pan.y); renderGraph();}});
window.addEventListener('mouseup',evt=>{if(linkDrag){const target=evt.target?.dataset?.in || evt.target?.closest?.('.node')?.dataset?.node; if(target&&nodeById(target)){const on=prompt(`Signal from ${linkDrag.from} to ${target}`, 'done')||'done'; edges().push({from:linkDrag.from,to:target,on}); select('edge',null,edges().length-1); setDirty(true);} linkDrag=null;tempPoint=null;renderAll();} drag=null;pan=null;});
$('graph').addEventListener('dblclick',evt=>{const g=evt.target.closest('.node'); if(g)step(g.dataset.node);});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on'); ['Inspect','Code','Json','State'].forEach(name=>$('tab'+name).hidden=t.dataset.tab!==name.toLowerCase());});
$('reloadBtn').onclick=loadAll; $('saveBtn').onclick=saveWiring; $('stepBtn').onclick=()=>step(); $('runBtn').onclick=run; $('pauseBtn').onclick=()=>post('/pause',{}).then(log); $('resumeBtn').onclick=()=>post('/resume',{goal:$('goal').value.trim()}).then(log); $('stopBtn').onclick=()=>post('/stop',{}).then(log); $('copyCodeBtn').onclick=copyCodebase; $('autoLayoutBtn').onclick=autoLayout; $('fitBtn').onclick=fitGraph; $('zoomOutBtn').onclick=()=>zoom(1.2); $('zoomInBtn').onclick=()=>zoom(.83); $('addNodeBtn').onclick=addNode; $('addEdgeBtn').onclick=addEdgeManual; $('deleteBtn').onclick=deleteSelection;
$('jsonEdit').addEventListener('input',()=>{jsonDirty=true;setDirty(true);}); window.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='s'){e.preventDefault();saveWiring();} if(e.key==='Delete')deleteSelection();});
try{const ev=new EventSource('/events'); ['node','result','stop','run_start','run_end','pause','codebase','node_created','wiring_saved','error'].forEach(k=>ev.addEventListener(k,e=>{log(k+': '+e.data); refreshOnly();}));}catch(e){log('SSE unavailable: '+e.message)}
loadAll();
</script>
</body>
</html>
