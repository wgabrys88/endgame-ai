<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>endgame-ai</title>
<style>
:root{--bg:#06080d;--panel:#0a0f1a;--border:#1a2744;--cyan:#00e5ff;--green:#39ff14;--dim:#5a6a7a;--txt:#e0e6ed;color-scheme:only dark}
*{margin:0;padding:0;box-sizing:border-box;color:inherit}
html,body{height:100dvh;overflow:hidden;font:13px/1.5 system-ui,sans-serif;background:var(--bg);color:var(--txt)}
body{display:grid;grid-template:"hd hd" auto "main log" 1fr / 1fr 22rem}
header{grid-area:hd;display:flex;align-items:center;gap:12px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--panel)}
header h1{font-size:14px;color:var(--cyan);letter-spacing:.5px}
header .status{margin-left:auto;font:11px ui-monospace,monospace;color:var(--dim)}
#main{grid-area:main;display:flex;flex-direction:column;overflow:hidden;padding:12px 16px;gap:12px}
#log{grid-area:log;display:flex;flex-direction:column;overflow:hidden;border-left:1px solid var(--border);background:var(--panel)}
#log header{padding:6px 10px;font-size:10px;color:var(--cyan);text-transform:uppercase;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
#logB{flex:1;overflow-y:auto;padding:6px 10px;font:10px/1.7 ui-monospace,monospace;color:#7a8a9a;scrollbar-width:thin}
.row{display:flex;gap:8px;align-items:center}
input[type=text]{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:4px;background:var(--bg);font:13px system-ui;outline:none}
input:focus{border-color:var(--cyan);box-shadow:0 0 6px #00e5ff30}
button{padding:5px 14px;border:1px solid var(--border);border-radius:4px;background:var(--bg);font:12px system-ui;cursor:pointer;transition:all .15s}
button:hover{border-color:var(--cyan);color:var(--cyan)}
button.on{border-color:var(--green);color:var(--green);box-shadow:0 0 8px #39ff1430}
.section{border:1px solid var(--border);border-radius:6px;background:var(--panel);overflow:hidden}
.section h2{font-size:10px;color:var(--cyan);text-transform:uppercase;letter-spacing:.4px;padding:6px 10px;border-bottom:1px solid var(--border)}
.section-body{padding:8px 10px;font:11px/1.6 ui-monospace,monospace;overflow-y:auto;max-height:calc(100dvh - 280px)}
#topo{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px}
.node{padding:3px 8px;border:1px solid var(--border);border-radius:4px;font-size:10px;transition:all .2s}
.node.active{border-color:var(--green);color:var(--green);box-shadow:0 0 6px #39ff1420}
.node.done{border-color:var(--dim);color:var(--dim)}
#plan{list-style:none;padding:8px 10px}
#plan li{padding:2px 0;font:11px/1.5 ui-monospace,monospace;color:var(--dim)}
#plan li.current{color:var(--green)}
#plan li.done{color:var(--dim);text-decoration:line-through}
#history{padding:8px 10px;font:10px/1.6 ui-monospace,monospace;color:#7a8a9a;max-height:200px;overflow-y:auto}
#overlay{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;z-index:100}
#overlay .card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px 20px;width:min(90vw,500px);max-height:80vh;overflow-y:auto;font:12px/1.6 ui-monospace,monospace}
#overlay h3{color:var(--cyan);margin-bottom:8px;font-size:12px}
</style>
</head>
<body>
<header>
  <h1>endgame-ai</h1>
  <button id="bSmoke">smoke</button>
  <button id="bWiring">wiring</button>
  <span class="status" id="status">idle</span>
</header>
<main id="main">
  <div class="row">
    <input type="text" id="goal" placeholder="Goal..." autofocus>
    <button id="bRun">Run</button>
    <button id="bStep">Step</button>
    <button id="bStop">Stop</button>
  </div>
  <div class="section"><h2>topology</h2><div id="topo"></div></div>
  <div class="section"><h2>plan</h2><ol id="plan"></ol></div>
  <div class="section"><h2>history</h2><div id="history"></div></div>
</main>
<aside id="log"><header>log <button id="bClr">clr</button></header><div id="logB"></div></aside>
<div id="overlay"><div class="card" id="overlayC"></div></div>
<script>
const S=location.origin,$=id=>document.getElementById(id),esc=s=>String(s??'').replace(/</g,'&lt;');
let W=null,polling=null,logs=[];

// --- Log ---
function log(node,sig,detail){
  const t=new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  logs.push({t,node,sig,detail});if(logs.length>200)logs.shift();
  $('logB').innerHTML=logs.map(l=>`<div><span style="color:var(--dim)">${l.t}</span> <b>${esc(l.node)}</b> <span style="color:var(--cyan)">${esc(l.sig)}</span> ${esc(l.detail||'')}</div>`).join('');
  $('logB').scrollTop=1e6;
}

// --- Topology render ---
function renderTopo(activeNode){
  if(!W)return;
  $('topo').innerHTML=W.topology.nodes.map(n=>`<span class="node${n.id===activeNode?' active':''}">${n.id}</span>`).join('');
}

// --- State render ---
function renderState(s){
  if(!s||!s.goal){$('status').textContent='idle';return;}
  $('status').textContent=s.satisfied?'✓ satisfied':`cycle ${s.step||0}/${(s.plan||[]).length}`;
  // Plan
  const plan=s.plan||[];
  $('plan').innerHTML=plan.map((p,i)=>{
    const cls=i<(s.step||0)?'done':i===(s.step||0)?'current':'';
    return `<li class="${cls}">${i+1}. ${esc(p.description)} <span style="color:var(--dim)">— ${esc(p.done_when)}</span></li>`;
  }).join('');
  // History
  const hist=s.history||[];
  $('history').innerHTML=hist.slice(-15).map(h=>`<div>[${h.attempt}] ${esc(h.action)} → ${esc(h.outcome)}</div>`).join('');
  $('history').scrollTop=1e6;
  // Active node
  renderTopo(s._resume_node||null);
}

// --- Polling ---
function startPoll(){
  if(polling)return;
  polling=setInterval(async()=>{
    try{const s=await(await fetch(S+'/state')).json();renderState(s);}catch(e){}
  },1500);
}
function stopPoll(){clearInterval(polling);polling=null;}

// --- Actions ---
$('bRun').onclick=async()=>{
  const g=$('goal').value.trim();if(!g)return;
  try{
    await fetch(S+'/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goal:g})});
    log('—','start',g);startPoll();
  }catch(e){log('err','!',e.message);}
};
$('goal').onkeydown=e=>{if(e.key==='Enter')$('bRun').click();};

$('bStep').onclick=async()=>{
  const g=$('goal').value.trim();if(!g)return;
  try{
    // Single step: run with max_cycles=1 via state manipulation
    // For now just trigger run — step-by-step needs server support
    await fetch(S+'/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goal:g})});
    log('—','step',g);startPoll();
  }catch(e){log('err','!',e.message);}
};

$('bStop').onclick=()=>{stopPoll();log('—','stop','');$('status').textContent='stopped';};

$('bSmoke').onclick=async()=>{
  try{
    const r=await(await fetch(S+'/smoke')).json();
    $('overlayC').innerHTML=`<h3>Smoke ${r.all_ok?'✓':'✗'} (${r.passed}/${r.total})</h3><pre>${esc(JSON.stringify(r.results,null,2))}</pre>`;
    $('overlay').style.display='flex';
  }catch(e){log('smoke','err',e.message);}
};

$('bWiring').onclick=async()=>{
  try{
    const w=await(await fetch(S+'/wiring')).json();
    $('overlayC').innerHTML=`<h3>wiring.json</h3><pre style="white-space:pre-wrap;max-height:60vh;overflow:auto">${esc(JSON.stringify(w,null,2))}</pre>`;
    $('overlay').style.display='flex';
  }catch(e){log('wiring','err',e.message);}
};

$('overlay').onclick=e=>{if(e.target===$('overlay'))$('overlay').style.display='none';};
$('bClr').onclick=()=>{logs=[];$('logB').innerHTML='';};

// --- SSE ---
const sse=new EventSource(S+'/events');
sse.addEventListener('node',e=>{const d=JSON.parse(e.data);log(d.id,'→','');renderTopo(d.id);});
sse.addEventListener('result',e=>{const d=JSON.parse(e.data);log(d.id,(d.s||[]).join(','),'');});
sse.addEventListener('stop',e=>{const d=JSON.parse(e.data);log('—',d.outcome?'satisfied':'stopped','');stopPoll();});
sse.addEventListener('push',e=>{const d=JSON.parse(e.data);log('push',d.type||'msg',d.text||'');});

// --- Init ---
(async()=>{
  try{
    W=await(await fetch(S+'/wiring')).json();
    renderTopo(null);
    log('init','ok',W.topology.nodes.length+' nodes');
    // Check for existing state
    const s=await(await fetch(S+'/state')).json();
    if(s&&s.goal){renderState(s);startPoll();}
  }catch(e){log('init','err',e.message);}
})();
</script>
</body>
</html>
