<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>endgame-ai</title>
<script src="https://cdn.jsdelivr.net/npm/elkjs@0.9.3/lib/elk.bundled.js"></script>
<style>
  :root {
    color-scheme: dark;
    --bg: #06080d;
    --panel: #0c1220;
    --line: #1a2744;
    --accent: #38bdf8;
    --green: #4ade80;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100dvh; overflow: hidden; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }

  #app {
    display: grid; height: 100dvh;
    grid-template: "toolbar toolbar toolbar" 2.5rem "canvas log inspect" 1fr / 1fr min(16rem, 22vw) min(22rem, 30vw);
  }
  @media (max-width: 900px) {
    #app { grid-template: "toolbar toolbar" 2.5rem "canvas panel" 1fr / 1fr min(20rem, 40vw); }
    #log { grid-area: panel; }
    #inspect { display: none; }
  }
  @media (orientation: portrait) {
    #app { grid-template: "toolbar" 2.5rem "canvas" 1fr "log" 30dvh / 1fr; }
    #inspect { display: none; }
  }

  #toolbar {
    grid-area: toolbar;
    display: flex; align-items: center; gap: .4rem; padding: 0 .6rem;
    background: var(--panel); border-bottom: 1px solid var(--line);
    overflow-x: auto; scrollbar-width: none;
  }
  #toolbar::-webkit-scrollbar { display: none; }
  #toolbar h1 { color: var(--accent); font-size: .78rem; white-space: nowrap; }
  #toolbar button {
    padding: .3rem .5rem; border: 1px solid var(--line); border-radius: .3rem;
    background: var(--panel); color: var(--text); font-size: .68rem;
    cursor: pointer; white-space: nowrap;
  }
  #toolbar button:hover { border-color: var(--accent); color: var(--accent); }
  #toolbar .spacer { flex: 1; }
  #toolbar #status { font-size: .62rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 18rem; }

  #canvas { grid-area: canvas; min-height: 0; overflow: hidden; position: relative; }
  #canvas svg { width: 100%; height: 100%; display: block; }

  #log {
    grid-area: log;
    background: var(--panel); border-inline-start: 1px solid var(--line);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #log-head {
    padding: .4rem .5rem; font-size: .6rem; color: var(--muted);
    border-bottom: 1px solid var(--line); flex: 0 0 auto;
  }
  #log-body {
    flex: 1; min-height: 0; overflow-y: auto; padding: .4rem .5rem;
    font: .58rem/1.5 ui-monospace, monospace; color: #94a3b8;
  }
  #log-body .entry { margin-bottom: .25rem; }
  #log-body .time { color: var(--muted); }
  #log-body .node { color: var(--text); font-weight: 600; }
  #log-body .sig { color: var(--accent); }
  #log-body .detail { color: #cbd5e1; margin-left: .8rem; display: block; word-break: break-all; }

  #inspect {
    grid-area: inspect;
    background: var(--panel); border-inline-start: 1px solid var(--line);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #inspect-head {
    padding: .4rem .5rem; font-size: .6rem; color: var(--muted);
    border-bottom: 1px solid var(--line); flex: 0 0 auto;
    display: flex; justify-content: space-between; align-items: center;
  }
  #inspect-head button {
    padding: .15rem .4rem; border: 1px solid var(--line); border-radius: .2rem;
    background: var(--panel); color: var(--accent); font-size: .55rem; cursor: pointer;
  }
  #inspect-body {
    flex: 1; min-height: 0; overflow-y: auto; padding: .5rem;
    font-size: .62rem;
  }
  #inspect-body label { display: block; color: var(--muted); font-size: .55rem; margin-top: .5rem; margin-bottom: .15rem; }
  #inspect-body label:first-child { margin-top: 0; }
  #inspect-body input, #inspect-body textarea, #inspect-body select {
    width: 100%; padding: .3rem .4rem; border: 1px solid var(--line); border-radius: .25rem;
    background: var(--bg); color: var(--text); font: .6rem/1.4 ui-monospace, monospace;
    resize: vertical;
  }
  #inspect-body textarea { min-height: 4rem; }
  #inspect-body .blocks-list { padding: 0; list-style: none; }
  #inspect-body .blocks-list li {
    padding: .2rem .3rem; border: 1px solid var(--line); border-radius: .2rem;
    margin-bottom: .2rem; font-size: .55rem; color: var(--text);
  }
  #inspect-body .blocks-list li span { color: var(--muted); }
  #inspect-body .io-box {
    background: var(--bg); border: 1px solid var(--line); border-radius: .25rem;
    padding: .3rem .4rem; font: .55rem/1.4 ui-monospace, monospace;
    color: #94a3b8; max-height: 10rem; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
  }

  .elk-node { cursor: pointer; transition: filter .3s; }
  .elk-node rect { rx: 6; ry: 6; stroke-width: 2; transition: stroke .3s, filter .3s; }
  .elk-node.active rect { stroke: var(--green) !important; filter: drop-shadow(0 0 8px rgba(74,222,128,.6)); }
  .elk-node.selected rect { stroke: var(--accent) !important; stroke-dasharray: 4 2; }
  .elk-node text { fill: var(--text); font-size: 10px; font-weight: 600; pointer-events: none; }
  .elk-node .type-label { fill: var(--muted); font-size: 8px; font-weight: 400; }
  .elk-edge { fill: none; stroke: #0e7490; stroke-width: 1.5; marker-end: url(#arrow); transition: stroke .3s; }
  .elk-edge.active { stroke: var(--green); stroke-width: 2.5; }
  .edge-label { fill: var(--muted); font-size: 7px; paint-order: stroke; stroke: var(--bg); stroke-width: 3px; }
  #err {
    position: fixed; top: 2.5rem; left: 0; right: 0; z-index: 99;
    padding: .4rem .6rem; background: #450a0a; border-bottom: 1px solid #ef4444;
    color: #fecaca; font-size: .68rem; display: none;
  }
</style>
</head>
<body>
<div id="app">
  <nav id="toolbar">
    <h1>⚡ endgame</h1>
    <button id="btn-step">Step</button>
    <button id="btn-run">Run</button>
    <button id="btn-stop">Stop</button>
    <button id="btn-auto">Auto</button>
    <button id="btn-save">Save</button>
    <span class="spacer"></span>
    <span id="status">…</span>
  </nav>
  <div id="canvas"></div>
  <aside id="log">
    <div id="log-head">log</div>
    <div id="log-body"></div>
  </aside>
  <aside id="inspect">
    <div id="inspect-head"><span>node inspector</span><button id="btn-apply">Apply</button></div>
    <div id="inspect-body"><p style="color:var(--muted)">click a node</p></div>
  </aside>
</div>
<div id="err" role="alert"></div>
<script type="module">
const SERVER = location.origin;
const $ = id => document.getElementById(id);
const status = t => { $('status').textContent = t; };
const fail = t => { const e = $('err'); e.style.display = 'block'; e.textContent = t; };
const clearErr = () => { $('err').style.display = 'none'; };

let wiring, elkGraph, svgEl;
let liveNode, liveState, liveRun, liveStop;
let liveLog = [];
let selectedNode = null;
let lastIO = {}; // nodeId → {input, output}

// --- Colors ---
const PALETTE = ['#166534','#5b21b6','#1e40af','#0e7490','#7e22ce','#047857','#b45309','#15803d','#1e3a5f','#9a3412','#86198f','#be185d'];
const typeColors = {};
function colorFor(type) {
  if (!typeColors[type]) typeColors[type] = PALETTE[Object.keys(typeColors).length % PALETTE.length];
  return typeColors[type];
}

// --- ELK ---
const elk = new ELK();
async function computeLayout(w) {
  const t = w.topology;
  return elk.layout({
    id: "root",
    layoutOptions: {
      'elk.algorithm': 'layered',
      'elk.direction': 'RIGHT',
      'elk.edgeRouting': 'ORTHOGONAL',
      'elk.layered.spacing.nodeNodeBetweenLayers': '90',
      'elk.spacing.nodeNode': '35',
      'elk.layered.spacing.edgeEdgeBetweenLayers': '12',
      'elk.layered.spacing.edgeNodeBetweenLayers': '20',
      'elk.layered.crossingMinimization.strategy': 'LAYER_SWEEP',
      'elk.layered.nodePlacement.strategy': 'BRANDES_KOEPF',
      'elk.portConstraints': 'FIXED_ORDER'
    },
    children: t.nodes.map(n => ({ id: n.id, width: 130, height: 44 })),
    edges: t.edges.map((e, i) => ({ id: `e${i}`, sources: [e.from], targets: [e.to], labels: [{ text: e.on || '' }] }))
  });
}

// --- SVG ---
function renderSVG(layout) {
  const pad = 30, W = layout.width + pad * 2, H = layout.height + pad * 2;
  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#22d3ee"/></marker></defs>`;
  for (const edge of layout.edges || []) {
    for (const sec of edge.sections || []) {
      let d = `M ${sec.startPoint.x+pad} ${sec.startPoint.y+pad}`;
      for (const bp of sec.bendPoints || []) d += ` L ${bp.x+pad} ${bp.y+pad}`;
      d += ` L ${sec.endPoint.x+pad} ${sec.endPoint.y+pad}`;
      svg += `<path class="elk-edge" data-from="${edge.sources?.[0]||''}" data-to="${edge.targets?.[0]||''}" d="${d}"/>`;
    }
    if (edge.labels?.[0]?.text && edge.sections?.[0]) {
      const s = edge.sections[0], bps = s.bendPoints || [];
      const mid = bps.length ? bps[Math.floor(bps.length/2)] : {x:(s.startPoint.x+s.endPoint.x)/2, y:(s.startPoint.y+s.endPoint.y)/2};
      svg += `<text class="edge-label" x="${mid.x+pad}" y="${mid.y+pad-4}">${esc(edge.labels[0].text)}</text>`;
    }
  }
  for (const node of layout.children || []) {
    const x = node.x+pad, y = node.y+pad;
    const nd = wiring.topology.nodes.find(n => n.id === node.id);
    const color = colorFor(nd?.type || 'unknown');
    svg += `<g class="elk-node" data-id="${node.id}" transform="translate(${x},${y})">`;
    svg += `<rect width="${node.width}" height="${node.height}" fill="#0f172a" stroke="${color}"/>`;
    svg += `<text x="${node.width/2}" y="${node.height/2+1}" text-anchor="middle" dominant-baseline="middle">${esc(node.id)}</text>`;
    svg += `<text class="type-label" x="${node.width/2}" y="${node.height-6}" text-anchor="middle">${esc(nd?.type||'')}</text>`;
    svg += `</g>`;
  }
  svg += `</svg>`;
  $('canvas').innerHTML = svg;
  svgEl = $('canvas').querySelector('svg');
  // click handler
  svgEl.addEventListener('click', e => {
    const g = e.target.closest('.elk-node');
    if (g) selectNode(g.dataset.id);
  });
}

function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// --- Node selection & inspector ---
function selectNode(id) {
  selectedNode = id;
  svgEl.querySelectorAll('.elk-node').forEach(g => g.classList.remove('selected'));
  const g = svgEl.querySelector(`.elk-node[data-id="${id}"]`);
  if (g) g.classList.add('selected');
  renderInspector();
}

function renderInspector() {
  const nd = wiring.topology.nodes.find(n => n.id === selectedNode);
  if (!nd) { $('inspect-body').innerHTML = '<p style="color:var(--muted)">click a node</p>'; return; }
  const p = nd.prompt || {};
  const blocks = p.user?.blocks || [];
  const io = lastIO[nd.id];
  let h = '';
  h += `<label>id</label><input value="${esc(nd.id)}" readonly>`;
  h += `<label>type</label><input id="inp-type" value="${esc(nd.type||'')}">`;
  h += `<label>label</label><input id="inp-label" value="${esc(nd.label||'')}">`;
  h += `<label>role prompt (${esc(p.role||'none')})</label>`;
  const roleFile = p.role ? `prompts/${p.role}.md` : '';
  h += `<textarea id="inp-role" placeholder="role prompt text loaded from ${roleFile}">${esc(nd._roleText||'(click Apply to load)')}</textarea>`;
  h += `<label>input blocks</label><ul class="blocks-list">`;
  for (const b of blocks) h += `<li><b>${esc(b.label)}</b> <span>← ${esc(b.source)}</span>${b.always?' ✓':''}</li>`;
  if (!blocks.length) h += `<li style="color:var(--muted)">no wired inputs</li>`;
  h += `</ul>`;
  h += `<label>last LLM input</label><div class="io-box">${io?.input ? esc(io.input) : '—'}</div>`;
  h += `<label>last LLM output</label><div class="io-box">${io?.output ? esc(io.output) : '—'}</div>`;
  $('inspect-body').innerHTML = h;
}

$('btn-apply').onclick = () => {
  if (!selectedNode) return;
  const nd = wiring.topology.nodes.find(n => n.id === selectedNode);
  if (!nd) return;
  const t = document.getElementById('inp-type');
  const l = document.getElementById('inp-label');
  if (t) nd.type = t.value;
  if (l) nd.label = l.value;
  status(`applied ${nd.id}`);
};

// --- Glow ---
function glow(id) {
  if (!svgEl) return;
  svgEl.querySelectorAll('.elk-node').forEach(g => g.classList.remove('active'));
  svgEl.querySelectorAll('.elk-edge').forEach(p => p.classList.remove('active'));
  if (!id) return;
  svgEl.querySelector(`.elk-node[data-id="${id}"]`)?.classList.add('active');
  svgEl.querySelectorAll(`.elk-edge[data-to="${id}"]`).forEach(p => p.classList.add('active'));
}

// --- Log ---
function appendLog(node, signals, detail) {
  liveLog.push({ t: new Date().toLocaleTimeString(), n: node, s: signals, d: detail });
  const body = $('log-body');
  let html = '';
  for (const l of liveLog.slice(-30)) {
    html += `<div class="entry"><span class="time">${esc(l.t)}</span> <span class="node">${esc(l.n)}</span> <span class="sig">[${esc(l.s)}]</span>`;
    if (l.d) html += `<span class="detail">${esc(l.d)}</span>`;
    html += `</div>`;
  }
  body.innerHTML = html;
  body.scrollTop = body.scrollHeight;
}

// --- API ---
const topo = id => wiring?.topology?.nodes?.find(n => n.id === id);
const next = (from, sigs) => wiring.topology.edges
  .filter(e => e.from === from && (e.on === '*' || (e.on||'').split('|').some(s => sigs.includes(s))))
  .map(e => e.to)[0] ?? null;

async function callNode(id, state) {
  const type = topo(id)?.type || 'unknown';
  const input = JSON.stringify(state, null, 1);
  const r = await fetch(`${SERVER}/node/${type}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ state })
  });
  const data = await r.json();
  const output = JSON.stringify(data, null, 1);
  lastIO[id] = { input, output };
  if (id === selectedNode) renderInspector();
  return data;
}

// --- Execution ---
const freshState = g => ({
  goal: g, step: 0, retries: 0, history: [], reasoning: {}, reasoning_chain: [],
  planner_retries: 0, replan_count: 0, last_error: '', bus_last_check: Date.now()/1e3, no_desktop: false
});

function extractDetail(sp) {
  if (sp.plan) return `plan: ${sp.plan.map(p=>p.description).join(' → ')}`;
  if (sp.step_goal) return `goal: "${sp.step_goal}"`;
  if (sp.last_actions) return `actions: ${sp.last_actions}`;
  if (sp.reasoning?.last) return sp.reasoning.last.slice(0, 200);
  return '';
}

function needGoal() {
  if (liveState) return true;
  const g = prompt('Goal:');
  if (!g) return false;
  liveState = freshState(g);
  liveNode = wiring.topology.cycle_start;
  glow(liveNode);
  appendLog('—', 'start', `goal: "${g}"`);
  return true;
}

async function advance() {
  if (!liveNode) return false;
  const id = liveNode;
  glow(id);
  status(`⏳ ${id}…`);
  const r = await callNode(id, liveState);
  liveState = { ...liveState, ...r.state_patch };
  const s = r.signals || [];
  liveNode = next(id, s);
  appendLog(id, s.join(','), extractDetail(r.state_patch || {}));
  status(`${id} → [${s}]${liveNode ? ' → '+liveNode : ' (end)'}`);
  glow(liveNode);
  return !!(liveNode && !s.includes('idle') && !liveState.satisfied);
}

async function step() {
  if (!needGoal() || !liveNode) return status(liveNode ? '…' : 'done');
  try { await advance(); } catch(e) { fail(e.message); }
}
async function run() {
  if (!needGoal()) return;
  liveRun = true; liveStop = false;
  try { while (liveRun && !liveStop && liveNode) { if (!await advance()) break; await new Promise(r=>setTimeout(r,300)); } }
  catch(e) { fail(e.message); }
  liveRun = false; status('done');
}
async function save() {
  const r = await fetch(`${SERVER}/wiring`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(wiring) });
  const d = await r.json();
  if (!r.ok || d.error) { fail(d.details ? d.details.join('; ') : d.error); return; }
  clearErr(); status(`saved ${d.nodes} nodes`);
}

// --- SSE ---
const sse = new EventSource(`${SERVER}/events`);
sse.addEventListener('node', e => { const d = JSON.parse(e.data); glow(d.id); status(`auto: ${d.id}`); });
sse.addEventListener('result', e => { const d = JSON.parse(e.data); appendLog(d.id, (d.s||[]).join(','), ''); });
sse.addEventListener('stop', () => { glow(null); status('auto done'); });

// --- Buttons ---
$('btn-step').onclick = () => step();
$('btn-run').onclick = () => run();
$('btn-stop').onclick = () => { liveStop = true; liveRun = false; status('stopped'); glow(null); };
$('btn-auto').onclick = () => {
  const g = prompt('Goal (server-side):');
  if (g) fetch(`${SERVER}/run`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({goal:g}) });
};
$('btn-save').onclick = () => save();

// --- Init ---
try {
  const h = await (await fetch(`${SERVER}/health`)).json();
  if (!h.ok) throw new Error('health failed');
  wiring = await (await fetch(`${SERVER}/wiring`)).json();
  status(`${wiring.topology.nodes.length} nodes · ${wiring.topology.edges.length} edges`);
  const layout = await computeLayout(wiring);
  renderSVG(layout);
  elkGraph = layout;
} catch(e) { fail(e.message); status('offline'); }
</script>
</body>
</html>
