<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Endgame Wiring Lab</title>
<style>
:root{
  color-scheme:dark;
  --bg:#071017;--panel:#0b151d;--panel2:#0e1b25;--line:#20333f;--line2:#2d4655;
  --text:#dce8ef;--muted:#8097a5;--accent:#52d7b6;--blue:#6ea8ff;--danger:#e06b7d;--warn:#e7ba5b;

}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}
button,input,select,textarea{font:inherit;color:inherit}button{cursor:pointer}
#app{height:100%;display:grid;grid-template-rows:var(--bar-h) 1fr var(--status-h);background:var(--bg)}
.topbar{display:flex;align-items:center;gap:4px;padding:5px 8px;background:#0b1821;border-bottom:1px solid var(--line);z-index:30}
.brand{display:flex;align-items:center;gap:8px;margin-right:5px;min-width:178px;font:700 12px var(--mono);letter-spacing:.08em;white-space:nowrap}.brand-mark{width:18px;height:18px;border:1px solid var(--accent);display:grid;place-items:center;color:var(--accent);font-size:11px}.brand small{font-weight:400;color:var(--muted);letter-spacing:0}
.tool-group{display:flex;align-items:center;gap:3px;padding-right:5px;margin-right:3px;border-right:1px solid var(--line)}.tool-group:last-of-type{border-right:0}.spacer{flex:1}
button.tool{height:32px;min-width:32px;padding:0 9px;border:1px solid transparent;background:transparent;border-radius:4px;color:#b9cad3;font-size:12px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
button.tool:hover{background:#142630;border-color:#2d4655;color:white}button.tool:active{transform:translateY(1px)}button.tool.primary{background:#174b44;border-color:#2e796d;color:#dffaf3}button.tool.danger{color:#f096a3}button.tool:disabled{opacity:.35;cursor:default}
.icon{font:15px var(--mono);line-height:1}.file-label{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font:10px var(--mono);padding:0 6px}
.workspace{min-height:0;display:grid;grid-template-columns:var(--left-w) 5px minmax(0,1fr) 5px var(--right-w);transition:grid-template-columns .16s ease}
#app.left-closed .workspace{grid-template-columns:0 0 minmax(0,1fr) 5px var(--right-w)}#app.right-closed .workspace{grid-template-columns:var(--left-w) 5px minmax(0,1fr) 0 0}#app.left-closed.right-closed .workspace{grid-template-columns:0 0 minmax(0,1fr) 0 0}
.panel{min-width:0;min-height:0;background:var(--panel);display:flex;flex-direction:column;overflow:hidden}.left-panel{border-right:1px solid var(--line)}.right-panel{border-left:1px solid var(--line)}#app.left-closed .left-panel,#app.right-closed .right-panel{visibility:hidden}
.resizer{background:#09141c;cursor:col-resize;position:relative}.resizer:hover,.resizer:active{background:#214252}.resizer:after{content:"";position:absolute;inset:0 -3px}
.panel-head{height:38px;flex:none;display:flex;align-items:center;gap:8px;padding:0 10px;border-bottom:1px solid var(--line);font:700 10px var(--mono);letter-spacing:.12em;color:#a9bdc8;text-transform:uppercase}.panel-head .count{margin-left:auto;color:var(--muted);font-weight:400;letter-spacing:0}
.panel-body{padding:9px;overflow:auto;min-height:0}.search{width:100%;height:34px;border:1px solid var(--line2);background:#071118;border-radius:4px;padding:0 9px;outline:none;font-size:12px}.search:focus{border-color:#477486}
.node-list{display:flex;flex-direction:column;gap:2px;margin-top:8px}.node-item{width:100%;display:grid;grid-template-columns:10px 1fr auto;align-items:center;gap:8px;text-align:left;border:1px solid transparent;border-radius:4px;background:transparent;padding:7px 8px;color:#cbd9e1}.node-item:hover{background:#10222d}.node-item.selected{background:#14303b;border-color:#315565}.node-led{width:6px;height:6px;border-radius:50%;background:var(--blue)}.node-led.endpoint{background:#a779be}.node-item-main{display:flex;flex-direction:column;gap:2px;min-width:0}.node-item-main b{font:11px var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.node-item-main small{font:9px var(--mono);color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.node-count{font:9px var(--mono);color:var(--muted)}
.canvas{position:relative;min-width:0;min-height:0;overflow:hidden;background-color:#071017;background-image:linear-gradient(#142630 1px,transparent 1px),linear-gradient(90deg,#142630 1px,transparent 1px),linear-gradient(#0c1b24 1px,transparent 1px),linear-gradient(90deg,#0c1b24 1px,transparent 1px);background-size:100px 100px,100px 100px,20px 20px,20px 20px}
#paper{position:absolute;inset:0}.canvas-hud{position:absolute;left:10px;bottom:10px;display:flex;gap:4px;z-index:8}.canvas-hud button{width:30px;height:28px;border:1px solid var(--line2);background:#0c1c26;border-radius:4px;color:#b9cbd4}.canvas-hud button:hover{background:#15303d}.canvas-help{position:absolute;right:10px;bottom:10px;max-width:420px;padding:7px 9px;border:1px solid #263f4d;background:#08141cdd;border-radius:4px;color:#718a99;font-size:10px;line-height:1.4;pointer-events:none}
.inspector-tabs{height:38px;display:flex;align-items:end;border-bottom:1px solid var(--line);padding:0 8px;flex:none}.inspector-tab{height:38px;border:0;border-bottom:2px solid transparent;background:transparent;color:#7f97a5;padding:0 9px;font-size:11px}.inspector-tab:hover{color:#c4d4dc}.inspector-tab.active{color:#e7f1f5;border-color:var(--accent)}
#inspector{padding:10px;overflow:auto;min-height:0}.field{display:block;margin-bottom:11px}.field>span{display:block;margin-bottom:5px;color:#849ba8;font:9px var(--mono);letter-spacing:.08em;text-transform:uppercase}.field small{display:block;margin-top:4px;color:#6d8593;font-size:10px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line2);background:#071118;border-radius:4px;padding:7px 8px;outline:none;font-size:12px}.field input,.field select{height:34px}.field textarea{min-height:120px;resize:vertical;line-height:1.45}.field textarea.tall{min-height:390px}.field textarea.code{font:11px/1.5 var(--mono);tab-size:4}.field input:focus,.field select:focus,.field textarea:focus{border-color:#4a788a}
.section-title{margin:15px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--line);color:#9db1bc;font:700 9px var(--mono);letter-spacing:.1em;text-transform:uppercase}.actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}.actions button{height:31px;border:1px solid var(--line2);background:#10212b;border-radius:4px;padding:0 9px;font-size:11px}.actions button:hover{background:#17303c}.actions button.primary{border-color:#347e70;background:#17483f}.actions button.danger{border-color:#6d3440;color:#f095a2;background:#24171b}
.pin-list{display:flex;flex-direction:column;gap:4px}.pin-row{display:grid;grid-template-columns:8px minmax(0,1fr) 75px 26px;gap:6px;align-items:center;min-height:30px}.pin-dot{width:6px;height:6px;border-radius:50%;background:var(--blue)}.pin-dot.out{background:var(--accent)}.pin-name{font:10px var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pin-row select{height:27px;border:1px solid var(--line2);background:#09151d;border-radius:3px;font-size:10px}.icon-btn{width:25px;height:25px;border:1px solid transparent;background:transparent;color:#849aa7;border-radius:3px}.icon-btn:hover{border-color:#613942;color:#f292a0}.note,.muted{color:#728996;font-size:10px;line-height:1.5}.empty-state{display:grid;place-items:center;text-align:center;gap:8px;padding:45px 20px;color:#8197a4}.empty-state b{color:#c6d5dc;font-size:12px}.empty-state p{margin:0;max-width:250px;font-size:10px;line-height:1.55}.empty-icon{font:30px var(--mono);color:#4b6f80}
.statusbar{height:var(--status-h);display:flex;align-items:center;gap:12px;padding:0 9px;border-top:1px solid var(--line);background:#08131a;color:#718895;font:9px var(--mono)}.statusbar .spacer{flex:1}.statusbar .ok{color:var(--accent)}.statusbar .warning{color:var(--warn)}.statusbar .error{color:var(--danger)}
.modal-back{position:fixed;inset:0;background:#000a;display:none;place-items:center;z-index:100}.modal-back.show{display:grid}.modal{width:min(650px,92vw);max-height:80vh;background:#0c1821;border:1px solid #35505f;border-radius:6px;box-shadow:0 24px 80px #000b;display:flex;flex-direction:column}.modal-title{height:44px;padding:0 13px;display:flex;align-items:center;border-bottom:1px solid var(--line);font-size:13px}.modal-body{padding:14px;overflow:auto}.modal-actions{display:flex;justify-content:flex-end;gap:6px;padding:10px 13px;border-top:1px solid var(--line)}.modal-actions button{height:32px;border:1px solid var(--line2);background:#10212b;border-radius:4px;padding:0 12px}.modal-actions button.primary{background:#17483f;border-color:#347e70}.modal-actions button.danger{background:#24171b;border-color:#6d3440;color:#f095a2}
.issue-list{display:flex;flex-direction:column;gap:6px}.issue{display:grid;grid-template-columns:70px 1fr;gap:8px;padding:8px;border:1px solid var(--line2);background:#09141c;border-radius:4px;font:10px/1.45 var(--mono)}.issue.error{border-color:#66333d}.issue.warning{border-color:#67572c}.issue b{color:#8fa5b1}.issue.error b{color:var(--danger)}.issue.warning b{color:var(--warn)}

/* JointJS schematic styling */
.joint-paper{background:transparent!important}.joint-cell [joint-selector="body"],.joint-cell [joint-selector="header"]{shape-rendering:geometricPrecision}.joint-link .connection{shape-rendering:geometricPrecision}.joint-link:hover [joint-selector="line"]{stroke-width:2.1!important}.joint-link-tools .tool-remove circle{fill:#8f3c4b}.joint-port-body[joint-selector="portBody"]{transition:r .1s,stroke-width .1s}.joint-port-body[joint-selector="portBody"]:hover{r:6;stroke-width:2.3}.available-magnet{stroke:#f0c35e!important;stroke-width:2.4!important}.available-cell [joint-selector="body"]{stroke:#f0c35e!important}

<body>
<div id="app">
  <header class="topbar">
    <button id="leftToggle" class="tool" title="Toggle component list"><span class="icon">☰</span></button>
    <div class="brand"><span class="brand-mark">W</span><span>WIRING LAB <small>schematic editor</small></span></div>
    <div class="tool-group">
      <button id="openBtn" class="tool" title="Open JSON"><span class="icon">↥</span><span class="label">Open</span></button>
      <button id="openWritableBtn" class="tool" title="Open a writable JSON file"><span class="icon">↥</span><span class="label">Writable</span></button>
      <button id="saveBtn" class="tool primary" title="Save project JSON"><span class="icon">⌁</span><span class="label">Save</span></button>
      <button id="folderBtn" class="tool" title="Connect source folder"><span class="icon">▣</span><span class="label">Source</span></button>
    </div>
    <div class="tool-group">
      <button id="exportRuntimeBtn" class="tool" title="Export runtime JSON without editor layout"><span class="icon">⇩</span><span class="label">Runtime</span></button>
      <button id="exportProjectBtn" class="tool" title="Export project JSON with layout"><span class="icon">⇩</span><span class="label">Project</span></button>
    </div>
    <div class="tool-group">
      <button id="addNodeBtn" class="tool" title="Add node"><span class="icon">＋</span><span class="label">Node</span></button>
      <button id="addSignalBtn" class="tool" title="Add output signal pin"><span class="icon">＋</span><span class="label">Signal</span></button>
      <button id="deleteBtn" class="tool danger" title="Delete selected"><span class="icon">×</span></button>
    </div>
    <div class="tool-group">
      <button id="undoBtn" class="tool" title="Undo"><span class="icon">↶</span></button>
      <button id="redoBtn" class="tool" title="Redo"><span class="icon">↷</span></button>
      <button id="layoutBtn" class="tool" title="Auto layout"><span class="icon">⌘</span><span class="label">Layout</span></button>
      <button id="fitBtn" class="tool" title="Fit diagram"><span class="icon">◎</span></button>
      <button id="validateBtn" class="tool" title="Validate"><span class="icon">✓</span></button>
    </div>
    <div class="spacer"></div><div id="fileLabel" class="file-label"></div>
    <button id="rightToggle" class="tool" title="Toggle inspector"><span class="icon">☷</span></button>
  </header>

  <section class="workspace">
    <aside id="leftPanel" class="panel left-panel">
      <div class="panel-head">Components <span id="counts" class="count"></span></div>
      <div class="panel-body"><input id="nodeSearch" class="search" placeholder="Filter components…"><div id="nodeList" class="node-list"></div></div>
    </aside>
    <div class="resizer" data-side="left"></div>
    <main class="canvas">
      <div id="paper"></div>
      <div class="canvas-hud"><button id="zoomIn" title="Zoom in">+</button><button id="zoomOut" title="Zoom out">−</button><button id="fitBtn2" title="Fit" onclick="document.getElementById('fitBtn').click()">◎</button></div>
      <div class="canvas-help">Drag an output pin onto any component body. Select a wire to drag its endpoint or route handles. Crossing wires use schematic jump bridges.</div>
    </main>
    <div class="resizer" data-side="right"></div>
    <aside id="rightPanel" class="panel right-panel">
      <div class="inspector-tabs"><button class="inspector-tab active" data-tab="properties">Properties</button><button class="inspector-tab" data-tab="prompt">Prompt</button><button class="inspector-tab" data-tab="code">Code</button><button class="inspector-tab" data-tab="contract">Contract</button><button class="inspector-tab" data-tab="json">JSON</button></div>
      <div id="inspector"></div>
    </aside>
  </section>

  <footer class="statusbar"><span id="statusText">Ready</span><span class="spacer"></span><span id="zoomLabel">100%</span></footer>
</div>
<input id="fileInput" type="file" accept="application/json,.json" hidden>
<div id="modal" class="modal-back"><div class="modal"><div id="modalTitle" class="modal-title"></div><div id="modalBody" class="modal-body"></div><div id="modalActions" class="modal-actions"></div></div></div>
<div id="toast" class="toast"></div>
