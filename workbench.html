<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>endgame-ai workbench</title>
  <link rel="stylesheet" href="workbench.css" />
  <script type="module" src="workbench.js"></script>
</head>
<body>
  <header>
    <h1>endgame-ai workbench</h1>
    <div class="header-spacer"></div>
    <div class="status-pills">
      <span id="phase-pill" class="pill">phase: —</span>
      <span id="transport-pill" class="pill hot">transport: —</span>
      <span id="control-pill" class="pill">control: —</span>
    </div>
    <div class="controls-inline">
      <button id="btn-run" class="btn btn-primary" title="Run continuously">Run</button>
      <button id="btn-pause" class="btn btn-secondary" title="Pause before next node">Pause</button>
      <button id="btn-step" class="btn btn-secondary" title="Execute one node">Step</button>
    </div>
  </header>

  <main>
    <!-- Left Column -->
    <div class="left-column">
      <!-- Status Panel -->
      <section class="panel">
        <h2>Organism Status</h2>
        <div class="cards-grid">
          <div class="card">
            <div class="label">Phase</div>
            <div id="phase" class="value">—</div>
          </div>
          <div class="card">
            <div class="label">Current Node</div>
            <div id="node" class="value mono">—</div>
          </div>
          <div class="card">
            <div class="label">Next Node</div>
            <div id="next-node" class="value mono">—</div>
          </div>
          <div class="card">
            <div class="label">Tick</div>
            <div id="tick" class="value mono">0</div>
          </div>
          <div class="card">
            <div class="label">Transport</div>
            <div id="transport" class="value mono">—</div>
          </div>
          <div class="card">
            <div class="label">Control Mode</div>
            <div id="control-mode" class="value">—</div>
          </div>
          <div class="card">
            <div class="label">Step Token</div>
            <div id="step-token" class="value mono">0</div>
          </div>
          <div class="card">
            <div class="label">Goal</div>
            <div id="goal" class="value" style="max-width: 200px;">(none)</div>
          </div>
        </div>
      </section>

      <!-- Topology Graph -->
      <section class="panel">
        <div class="panel-title-row">
          <h2>Topology Graph</h2>
          <button id="btn-probe" class="btn btn-ghost" style="font-size:11px;padding:4px 8px;">Probe Transport</button>
        </div>
        <div id="topology-graph" class="graph-container"></div>
        <div id="probe-result" style="margin-top:12px;"></div>
      </section>

      <!-- Runtime Events -->
      <section class="panel">
        <h2>Runtime Events (Live)</h2>
        <div id="runtime-events" class="code-block" style="max-height:300px; font-size:11px;"></div>
      </section>
    </div>

    <!-- Right Column -->
    <div class="right-column">
      <!-- State Inspector -->
      <section class="panel">
        <h2>State Inspector</h2>
        <div class="code-block" id="state-content" style="max-height:400px;">{}</div>
      </section>

      <!-- Logs -->
      <section class="panel">
        <div class="panel-title-row">
          <h2>Runtime Logs</h2>
          <div class="form-group" style="margin:0;grid-template-columns:auto 1fr;">
            <label>Lines</label>
            <input type="number" id="log-lines" value="100" min="10" max="1000" style="width:80px;">
          </div>
        </div>
        <div id="logs-content" class="code-block" style="max-height:400px;"></div>
      </section>
    </div>

    <!-- Full Width Panels -->
    <section class="panel full-width">
      <h2>Wiring Editor</h2>
      <div id="wiring-editor"></div>
    </section>

    <section class="panel full-width">
      <div class="panel-title-row">
        <h2>ROD Brain Test</h2>
        <div style="display:flex;gap:8px;align-items:center;">
          <select id="test-transport" style="padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--fg);font:inherit;"></select>
          <button id="btn-test" class="btn btn-primary">Run ROD Test</button>
        </div>
      </div>
      <div id="test-result" style="margin-top:12px;"></div>
    </section>
  </main>
</body>
</html>
