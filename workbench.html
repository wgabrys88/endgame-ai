<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>endgame-ai workbench</title>
  <style>
    :root { color-scheme: dark; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
    body { margin: 0; background: #111318; color: #f2f4f8; }
    header { padding: 18px 22px; border-bottom: 1px solid #2a2f3a; background: #171a21; position: sticky; top: 0; z-index: 2; }
    h1 { margin: 0; font-size: clamp(20px, 3vw, 30px); }
    main { display: grid; grid-template-columns: minmax(260px, 380px) 1fr; gap: 16px; padding: 16px; }
    section { background: #171a21; border: 1px solid #2a2f3a; border-radius: 14px; padding: 16px; box-shadow: 0 10px 32px rgba(0,0,0,.22); }
    .stack { display: grid; gap: 16px; align-content: start; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .card { background: #20242d; border: 1px solid #343a48; border-radius: 12px; padding: 12px; min-height: 72px; }
    .label { color: #aab2c0; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    .value { font-size: 17px; margin-top: 6px; overflow-wrap: anywhere; }
    button { border: 0; border-radius: 10px; padding: 11px 14px; background: #354052; color: white; cursor: pointer; font-weight: 700; }
    button:hover { filter: brightness(1.12); }
    button.primary { background: #2764ff; }
    button.warn { background: #9b5c00; }
    button.danger { background: #8a2430; }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; }
    pre { background: #0b0d11; border: 1px solid #2a2f3a; border-radius: 12px; padding: 12px; overflow: auto; max-height: 55vh; white-space: pre-wrap; }
    details summary { cursor: pointer; color: #cbd5e1; margin-bottom: 10px; }
    @media (max-width: 850px) { main { grid-template-columns: 1fr; } header { position: static; } }
  </style>
</head>
<body>
  <header><h1>endgame-ai workbench</h1><div id="connection" class="label">connecting…</div></header>
  <main>
    <div class="stack">
      <section>
        <div class="label">Controls</div>
        <div class="controls" style="margin-top: 12px">
          <button class="primary" onclick="control('run')">Run</button>
          <button class="warn" onclick="control('pause')">Pause</button>
          <button onclick="control('step')">Step</button>
        </div>
      </section>
      <section>
        <div class="label">Status</div>
        <div class="cards" style="margin-top:12px">
          <div class="card"><div class="label">Phase</div><div id="phase" class="value">—</div></div>
          <div class="card"><div class="label">Control</div><div id="mode" class="value">—</div></div>
          <div class="card"><div class="label">Transport</div><div id="transport" class="value">—</div></div>
          <div class="card"><div class="label">Step token</div><div id="token" class="value">—</div></div>
        </div>
      </section>
    </div>
    <div class="stack">
      <section>
        <div class="cards">
          <div class="card"><div class="label">Current node</div><div id="node" class="value">—</div></div>
          <div class="card"><div class="label">Next node</div><div id="next" class="value">—</div></div>
          <div class="card"><div class="label">Last action</div><div id="action" class="value">—</div></div>
          <div class="card"><div class="label">Last error</div><div id="error" class="value">—</div></div>
        </div>
      </section>
      <section>
        <details open><summary>State</summary><pre id="state">{}</pre></details>
        <details><summary>Runtime log tail</summary><pre id="runtime">[]</pre></details>
      </section>
    </div>
  </main>
<script>
let inFlight = null;
function text(v) { return v === undefined || v === null || v === '' ? '—' : (typeof v === 'string' ? v : JSON.stringify(v)); }
async function control(mode) {
  const body = mode === 'step' ? {mode:'step'} : {mode};
  await fetch('/api/control', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  await refresh();
}
async function refresh() {
  if (inFlight) return;
  const ac = new AbortController();
  inFlight = ac;
  try {
    const res = await fetch('/api/status', {signal: ac.signal, cache:'no-store'});
    const data = await res.json();
    document.getElementById('connection').textContent = 'connected';
    const s = data.state || {}, c = data.control || {}, w = data.wiring || {};
    phase.textContent = text(s._phase);
    mode.textContent = text(c.mode);
    transport.textContent = text(w.transport);
    token.textContent = text(c.step_token);
    node.textContent = text(s.current_node);
    next.textContent = text(s.next_node);
    action.textContent = text(s.last_action);
    error.textContent = text(s.last_error);
    state.textContent = JSON.stringify(s, null, 2);
    runtime.textContent = JSON.stringify(data.runtime_tail || [], null, 2);
  } catch (err) {
    document.getElementById('connection').textContent = 'disconnected: ' + err;
  } finally { inFlight = null; }
}
refresh();
setInterval(refresh, 1000);
</script>
</body>
</html>
