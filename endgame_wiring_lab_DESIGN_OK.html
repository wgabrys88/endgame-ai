          if (nodeSet.has(name) && !Object.prototype.hasOwnProperty.call(edgeMap[name] || {}, "join")) issues.push({ level: "error", text: `Barrier ${name} needs a join edge.` });
        }
      }
      if (typeof topo.cycle_start === "string" && nodeSet.has(topo.cycle_start)) {
        const seen = new Set();
        const stack = [topo.cycle_start];
        while (stack.length) {
          const current = stack.pop();
          if (seen.has(current) || SENTINELS.has(current)) continue;
          seen.add(current);
          for (const raw of Object.values(edgeMap[current] || {})) for (const target of Array.isArray(raw) ? raw : [raw]) if (typeof target === "string") stack.push(target);
        }
        const unreachable = nodeList.filter(name => !seen.has(name));
        if (unreachable.length) issues.push({ level: "warning", text: `Unreachable from ${topo.cycle_start}: ${unreachable.join(", ")}` });
      }
      if (isObject(documentValue.prompt_aliases) && isObject(documentValue.prompts)) {
        for (const [name, promptName] of Object.entries(documentValue.prompt_aliases)) if (typeof promptName !== "string" || !(promptName in documentValue.prompts)) issues.push({ level: "error", text: `prompt_aliases.${name} names a missing prompt.` });
        for (const name of nodeList) {
          const promptName = documentValue.prompt_aliases[name] || name;
          if (!(promptName in documentValue.prompts)) issues.push({ level: "warning", text: `${name} resolves to missing prompt ${promptName}.` });
        }
      }
      return issues;
    }

    function showDiagnostics() {
      const issues = state.wiring ? validateDocument(state.wiring) : [];
      const body = issues.length ? issues.map(issue => `<div class="ewl-issue${issue.level === "warning" ? " is-warning" : ""}"><span class="ewl-issue-mark">${issue.level === "warning" ? "!" : "×"}</span><p>${esc(issue.text)}</p></div>`).join("") : '<div class="ewl-ok">Topology is coherent: every declared node is reachable and every wire has a valid destination.</div>';
      openSheet("Validation", `${issues.length} issue${issues.length === 1 ? "" : "s"}`, body);
    }

    function openMenu() {
      if (!state.wiring) {
        openSheet("Wiring Lab", "Responsive schematic editor", '<div class="ewl-sheet-grid"><button class="ewl-primary" type="button" data-action="open">Open wiring.json</button><button type="button" data-action="demo">Try demo</button></div><div class="ewl-section"><ol class="ewl-help"><li>Import a wiring document from your device.</li><li>Drag nodes, pan with one finger, and pinch to zoom.</li><li>Tap once to select; tap twice to edit a node or wire.</li><li>Save a runtime-compatible JSON copy when finished.</li></ol></div>');
        return;
      }
      const body = `<div class="ewl-sheet-grid"><button class="ewl-primary" type="button" data-action="open">Open JSON</button><button type="button" data-action="save">Save JSON</button><button type="button" data-action="add-node">Add node</button><button type="button" data-action="json-editor">Schema & JSON</button><button type="button" data-action="diagnostics">Validate</button><button type="button" data-action="new-document">New wiring</button></div><div class="ewl-section"><h3 class="ewl-section-title">View & export</h3><label class="ewl-switch"><span class="ewl-switch-copy"><strong>Nested families</strong><span>Group colon-qualified instances by base module.</span></span><input id="ewl-family-toggle" type="checkbox" ${state.groupFamilies ? "checked" : ""}></label><label class="ewl-switch"><span class="ewl-switch-copy"><strong>Responsive auto layout</strong><span>Recalculate topology spacing and orientation after the browser is resized.</span></span><input id="ewl-auto-layout-toggle" type="checkbox" ${state.autoLayoutResponsive ? "checked" : ""}></label><label class="ewl-switch"><span class="ewl-switch-copy"><strong>Include layout on save</strong><span>Add __wiring_lab metadata; leave off for clean runtime JSON.</span></span><input id="ewl-layout-toggle" type="checkbox" ${state.includeLayout ? "checked" : ""}></label></div><div class="ewl-section"><button type="button" data-action="help">Touch guide</button></div>`;
      openSheet("Wiring Lab", `${nodes().length} nodes · ${state.wires.length} wires`, body);
    }

    function showHelp() {
      openSheet("Touch guide", "Latest Chrome · phone, tablet, or PC", '<ol class="ewl-help"><li><b>Select and edit:</b> one tap selects a node or wire; two taps open its editor.</li><li><b>Four-sided pins:</b> inputs and outputs automatically move between the top, right, bottom, and left edges to face their connected neighbors.</li><li><b>Move a node:</b> drag the component body; its pin sides and wires are recalculated immediately.</li><li><b>Move a family:</b> drag its dashed container title.</li><li><b>Pan and zoom:</b> drag empty paper; pinch with two fingers. A mouse wheel also zooms.</li><li><b>Add a branch:</b> drag any output pin to another node, or use the + beside a signal.</li><li><b>Layout:</b> layered ordering, barycentric crossing minimization, adaptive bands, hub placement, and congestion-scored Manhattan channels spread the diagram.</li><li><b>Responsive layout:</b> enable it under More to recalculate after a browser resize without shrinking components below a readable scale.</li><li><b>Crossings:</b> vertical wires hop over horizontal wires; a hop is not a junction.</li><li><b>Save:</b> the default download preserves the complete imported document and edits only its topology. Layout metadata is optional.</li></ol>');
    }

    function openSearch() {
      if (!state.wiring) return;
      openSheet("Find node", `${allBoxNames().length} components`, '<div class="ewl-search-box"><label class="ewl-field"><span>Node ID</span><input id="ewl-search-input" type="text" inputmode="search" autocomplete="off" placeholder="Type a node name"></label><div id="ewl-search-results" class="ewl-search-results"></div></div>');
      const input = root.querySelector("#ewl-search-input");
      input.addEventListener("input", renderSearchResults);
      renderSearchResults();
      setTimeout(() => input.focus(), 30);
    }

    function renderSearchResults() {
      const input = root.querySelector("#ewl-search-input");
      const box = root.querySelector("#ewl-search-results");
      if (!input || !box) return;
      const query = input.value.trim().toLowerCase();
      const matches = allBoxNames().filter(name => !query || name.toLowerCase().includes(query)).slice(0, 80);
      box.innerHTML = matches.map(name => `<button class="ewl-search-result" type="button" data-action="search-result" data-node="${esc(name)}"><span>${esc(name)}</span><small>${nodes().includes(name) ? esc(nodeFile(name)) : "endpoint"}</small></button>`).join("") || '<p class="ewl-file-name">No matching nodes.</p>';
    }

    function openJsonEditor() {
      if (!state.wiring) return;
      const sections = Object.entries(state.wiring).map(([key, value]) => `<span class="ewl-badge">${esc(key)} · ${Array.isArray(value) ? `${value.length} items` : isObject(value) ? `${Object.keys(value).length} keys` : typeof value}</span>`).join(" ");
      const body = `<div class="ewl-row">${sections}</div><div class="ewl-section"><label class="ewl-field"><span>Complete wiring document</span><textarea id="ewl-json-editor" spellcheck="false">${esc(JSON.stringify(state.wiring, null, 2))}</textarea></label><div class="ewl-row"><button class="ewl-primary" type="button" data-action="apply-json">Apply JSON</button><button type="button" data-action="format-json">Format</button></div></div>`;
      openSheet("Schema & JSON", state.wiring.schema || "wiring document", body);
    }

    function updateChrome() {
      root.querySelector("#ewl-file-name").textContent = state.wiring ? `${state.dirty ? "● " : ""}${state.fileName}` : "No wiring loaded";
      root.querySelector("#ewl-save-button").disabled = !state.wiring;
      root.querySelectorAll('[data-action="fit"], [data-action="layout"], [data-action="search"]').forEach(button => { button.disabled = !state.wiring; });
      root.querySelector("#ewl-undo-button").disabled = !state.history.length;
      const layoutButton = root.querySelector("#ewl-layout-button");
      layoutButton.classList.toggle("is-active", Boolean(state.wiring && state.autoLayoutResponsive));
      layoutButton.setAttribute("aria-pressed", String(Boolean(state.wiring && state.autoLayoutResponsive)));
    }

    function toast(message) {
      const element = root.querySelector("#ewl-toast");
      element.textContent = String(message);
      element.classList.add("is-visible");
      clearTimeout(state.toastTimer);
      state.toastTimer = setTimeout(() => element.classList.remove("is-visible"), 2600);
    }

    function exportedDocument() {
      const output = clone(state.wiring);
      delete output.__wiring_lab;
      if (state.includeLayout) {
        output.__wiring_lab = { ...clone(state.importedMeta), version: 6, nodes: clone(state.positions), groupFamilies: state.groupFamilies, autoLayoutResponsive: state.autoLayoutResponsive, editor: "endgame-mobile-wiring-lab" };
      }
      return output;
    }

    function saveDocument() {
      if (!state.wiring) return;
      const issues = validateDocument(state.wiring);
      const errors = issues.filter(issue => issue.level === "error");
      if (errors.length && !window.confirm(`${errors.length} validation error${errors.length === 1 ? "" : "s"} remain. Save this JSON anyway?`)) return showDiagnostics();
      const text = JSON.stringify(exportedDocument(), null, 2) + "\n";
      const blob = new Blob([text], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = state.fileName.replace(/\.json$/i, "") + (state.includeLayout ? "_project.json" : ".json");
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
      state.dirty = false;
      updateChrome();
      closeSheet();
      toast(state.includeLayout ? "Project JSON saved with layout" : "Runtime-compatible JSON saved");
    }

    async function importFile(file) {
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text.replace(/^\uFEFF/, ""));
        loadDocument(parsed, file.name || "wiring.json");
      } catch (error) {
        toast(`Could not open JSON: ${error.message}`);
      } finally {
        fileInput.value = "";
      }
    }

    function addNode() {
      const name = window.prompt("New node ID", "node_new");
      if (!name) return;
      const clean = name.trim();
      if (!clean) return;
      if (allBoxNames().includes(clean)) return toast("Choose a unique node ID");
      mutate(() => {
        topology().nodes.push(clean);
        topology().edges[clean] = {};
        if (isObject(state.wiring.prompts) && !(clean in state.wiring.prompts)) state.wiring.prompts[clean] = "";
        const size = stageSize();
        const center = screenToWorld(size.left + size.w / 2, size.top + size.h / 2);
        state.positions[clean] = { x: center.x - NODE_W / 2, y: center.y - 80 };
        state.selection = { type: "node", id: clean };
      }, `Added ${clean}`);
      renderInspector();
    }

    function renameNode() {
      const oldName = state.selection?.type === "node" ? state.selection.id : "";
      if (!nodes().includes(oldName)) return;
      const value = window.prompt("Rename node", oldName);
      if (!value) return;
      const newName = value.trim();
      if (!newName || newName === oldName) return;
      if (allBoxNames().includes(newName)) return toast("Choose a unique node ID");
      mutate(() => {
        const index = topology().nodes.indexOf(oldName);
        topology().nodes[index] = newName;
        const replacementEdges = {};
        for (const [source, signals] of Object.entries(topology().edges)) replacementEdges[source === oldName ? newName : source] = signals;
        topology().edges = replacementEdges;
        for (const signals of Object.values(topology().edges)) for (const [signal, raw] of Object.entries(signals || {})) {
          if (Array.isArray(raw)) signals[signal] = raw.map(target => target === oldName ? newName : target);
          else if (raw === oldName) signals[signal] = newName;
        }
        if (topology().cycle_start === oldName) topology().cycle_start = newName;
        if (isObject(topology().barriers) && Object.prototype.hasOwnProperty.call(topology().barriers, oldName)) { topology().barriers[newName] = topology().barriers[oldName]; delete topology().barriers[oldName]; }
        if (isObject(state.wiring.prompt_aliases) && Object.prototype.hasOwnProperty.call(state.wiring.prompt_aliases, oldName)) { state.wiring.prompt_aliases[newName] = state.wiring.prompt_aliases[oldName]; delete state.wiring.prompt_aliases[oldName]; }
        const sharedPrompt = isObject(state.wiring.prompt_aliases) && Object.values(state.wiring.prompt_aliases).includes(oldName);
        if (isObject(state.wiring.prompts) && Object.prototype.hasOwnProperty.call(state.wiring.prompts, oldName) && !sharedPrompt) { state.wiring.prompts[newName] = state.wiring.prompts[oldName]; delete state.wiring.prompts[oldName]; }
        if (isObject(state.wiring.node_defs) && Object.prototype.hasOwnProperty.call(state.wiring.node_defs, oldName)) { state.wiring.node_defs[newName] = state.wiring.node_defs[oldName]; delete state.wiring.node_defs[oldName]; }
        state.positions[newName] = state.positions[oldName];
        delete state.positions[oldName];
        state.selection = { type: "node", id: newName };
      }, `Renamed ${oldName} to ${newName}`);
      renderInspector();
    }

    function deleteNode() {
      const name = state.selection?.type === "node" ? state.selection.id : "";
      if (!nodes().includes(name)) return;
      if (!window.confirm(`Delete ${name} and every wire connected to it?`)) return;
      mutate(() => {
        topology().nodes = topology().nodes.filter(item => item !== name);
        delete topology().edges[name];
        for (const [source, signals] of Object.entries(topology().edges)) for (const [signal, raw] of Object.entries(signals || {})) {
          const list = (Array.isArray(raw) ? raw : [raw]).filter(target => target !== name);
          if (list.length) signals[signal] = list.length === 1 ? list[0] : list;
          else delete signals[signal];
        }
        if (topology().cycle_start === name) topology().cycle_start = topology().nodes[0] || "";
        if (isObject(topology().barriers)) delete topology().barriers[name];
        if (isObject(state.wiring.prompt_aliases)) delete state.wiring.prompt_aliases[name];
        if (isObject(state.wiring.node_defs)) delete state.wiring.node_defs[name];
        delete state.positions[name];
        state.selection = null;
      }, `Deleted ${name}`);
      closeSheet();
    }

    function addSignal() {
      const name = state.selection?.type === "node" ? state.selection.id : "";
      if (!nodes().includes(name)) return;
      const value = window.prompt("New output signal", "next");
      if (!value) return;
      const signal = value.trim();
      if (!signal) return;
      if (Object.prototype.hasOwnProperty.call(edges()[name] || {}, signal)) return toast("That signal already exists");
      beginConnect({ mode: "new-signal", source: name, signal });
    }

    function deleteWire() {
      const wire = state.wires.find(item => wireKey(item) === wireKey(state.selection || {}));
      if (!wire) return;
      mutate(() => {
        const list = targetsOf(wire.source, wire.signal);
        list.splice(wire.index, 1);
        setTargets(wire.source, wire.signal, list);
        state.selection = { type: "node", id: wire.source };
      }, `Deleted ${wire.signal} → ${wire.target}`);
      renderInspector();
    }

    function pointerDown(event) {
      if (!state.wiring || event.button > 0) return;
      const target = eventTarget(event);
      state.pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
      svg.setPointerCapture(event.pointerId);
      if (state.pointers.size === 2) {
        if (state.gesture?.type === "node") state.positions[state.gesture.name] = { ...state.gesture.origin };
        if (state.gesture?.type === "group") for (const name of state.gesture.members) state.positions[name] = { ...state.gesture.origins[name] };
        const values = [...state.pointers.values()];
        const midpoint = { x: (values[0].x + values[1].x) / 2, y: (values[0].y + values[1].y) / 2 };
        state.gesture = { type: "pinch", startDistance: Math.hypot(values[1].x - values[0].x, values[1].y - values[0].y), startZoom: state.view.zoom, midpoint, world: screenToWorld(midpoint.x, midpoint.y) };
        state.preview = null;
        return;
      }
      if (state.pointers.size > 1) return;
      const port = target?.closest("[data-port-source]");
      const nodeTarget = target?.closest("[data-node]");
      const groupTarget = target?.closest("[data-group]");
      const wireTarget = target?.closest("[data-wire-index]");
      const world = screenToWorld(event.clientX, event.clientY);
      if (port) {
        const source = port.getAttribute("data-port-source");
        const signal = port.getAttribute("data-port-signal");
        const frame = state.frames.get(source);
        state.gesture = { type: "wire", pointerId: event.pointerId, source, signal, startClient: { x: event.clientX, y: event.clientY }, moved: false };
        state.preview = { start: frame.outPorts.get(signal), current: world };
        render();
      } else if (wireTarget) {
        const index = Number(wireTarget.getAttribute("data-wire-index"));
        const wire = state.wires[index];
        selectWire(index, false);
        state.gesture = { type: "tap", pointerId: event.pointerId, key: wire ? wireKey(wire) : "" };
      } else if (nodeTarget) {
        const name = nodeTarget.getAttribute("data-node");
        if (state.connect) {
          state.gesture = { type: "target", pointerId: event.pointerId, name };
        } else {
          const position = state.positions[name];
          state.gesture = { type: "node", pointerId: event.pointerId, name, startWorld: world, origin: { ...position }, before: snapshot(), moved: false };
          selectNode(name, false);
        }
      } else if (groupTarget) {
        const base = groupTarget.getAttribute("data-group");
        const members = familyGroups().get(base) || [];
        state.gesture = { type: "group", pointerId: event.pointerId, base, members, startWorld: world, origins: Object.fromEntries(members.map(name => [name, { ...state.positions[name] }])), before: snapshot(), moved: false };
      } else {
        state.gesture = { type: "pan", pointerId: event.pointerId, start: { x: event.clientX, y: event.clientY }, view: { ...state.view }, moved: false };
        svg.classList.add("ewl-dragging");
      }
    }

    function pointerMove(event) {
      if (!state.pointers.has(event.pointerId)) return;
      state.pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
      if (state.gesture?.type === "pinch") {
        const values = [...state.pointers.values()];
        if (values.length < 2) return;
        const distance = Math.hypot(values[1].x - values[0].x, values[1].y - values[0].y);
        const midpoint = { x: (values[0].x + values[1].x) / 2, y: (values[0].y + values[1].y) / 2 };
        const size = stageSize();
        const zoom = Math.min(2.6, Math.max(.1, state.gesture.startZoom * distance / Math.max(1, state.gesture.startDistance)));
        state.view.zoom = zoom;
        state.view.x = state.gesture.world.x - (midpoint.x - size.left) / zoom;
        state.view.y = state.gesture.world.y - (midpoint.y - size.top) / zoom;
        applyView();
        return;
      }
      const gesture = state.gesture;
      if (!gesture || gesture.pointerId !== event.pointerId) return;
      const world = screenToWorld(event.clientX, event.clientY);
      if (gesture.type === "node") {
        const dx = world.x - gesture.startWorld.x, dy = world.y - gesture.startWorld.y;
        if (Math.hypot(dx, dy) > 3 / state.view.zoom) gesture.moved = true;
        state.positions[gesture.name] = { x: gesture.origin.x + dx, y: gesture.origin.y + dy };
        queueRender();
      } else if (gesture.type === "group") {
        const dx = world.x - gesture.startWorld.x, dy = world.y - gesture.startWorld.y;
        if (Math.hypot(dx, dy) > 3 / state.view.zoom) gesture.moved = true;
        for (const name of gesture.members) state.positions[name] = { x: gesture.origins[name].x + dx, y: gesture.origins[name].y + dy };
        queueRender();
      } else if (gesture.type === "wire") {
        if (Math.hypot(event.clientX - gesture.startClient.x, event.clientY - gesture.startClient.y) > 8) gesture.moved = true;
        state.preview.current = world;
        render();
      } else if (gesture.type === "pan") {
        const dx = event.clientX - gesture.start.x, dy = event.clientY - gesture.start.y;
        if (Math.hypot(dx, dy) > 4) gesture.moved = true;
        state.view.x = gesture.view.x - dx / gesture.view.zoom;
        state.view.y = gesture.view.y - dy / gesture.view.zoom;
        applyView();
      }
    }

    function targetAt(clientX, clientY) {
      const element = document.elementFromPoint(clientX, clientY);
      return element instanceof Element ? element.closest("[data-node]")?.getAttribute("data-node") || "" : "";
    }

    function pointerUp(event) {
      const gesture = state.gesture;
      if (gesture?.type === "pinch") {
        state.pointers.delete(event.pointerId);
        if (state.pointers.size < 2) state.gesture = null;
        updateChrome();
        return;
      }
      if (gesture && gesture.pointerId === event.pointerId) {
        if (gesture.type === "node") {
          if (gesture.moved) { pushHistory(gesture.before); state.dirty = true; updateChrome(); }
          else { state.positions[gesture.name] = { ...gesture.origin }; handleCanvasTap("node", gesture.name, event); }
        } else if (gesture.type === "group" && gesture.moved) {
          pushHistory(gesture.before); state.dirty = true; updateChrome(); toast(`Moved ${gesture.base} family`);
        } else if (gesture.type === "group") {
          for (const name of gesture.members) state.positions[name] = { ...gesture.origins[name] };
        } else if (gesture.type === "wire") {
          const target = targetAt(event.clientX, event.clientY);
          state.preview = null;
          if (gesture.moved && target) { state.connect = { mode: "add", source: gesture.source, signal: gesture.signal }; finishConnect(target); }
          else { state.connect = { mode: "add", source: gesture.source, signal: gesture.signal }; render(); }
        } else if (gesture.type === "target") {
          finishConnect(gesture.name);
        } else if (gesture.type === "tap" && gesture.key) {
          handleCanvasTap("wire", gesture.key, event);
        }
      }
      state.pointers.delete(event.pointerId);
      state.gesture = null;
      state.preview = null;
      svg.classList.remove("ewl-dragging");
      queueRender();
    }

    function pointerCancel(event) {
      state.pointers.delete(event.pointerId);
      state.gesture = null;
      state.preview = null;
      svg.classList.remove("ewl-dragging");
      queueRender();
    }

    function handleStageResize() {
      const size = stageSize();
      applyView();
      if (!state.lastStageSize) {
        state.lastStageSize = { w: size.w, h: size.h };
        return;
      }
      const changed = Math.abs(size.w - state.lastStageSize.w) > 12 || Math.abs(size.h - state.lastStageSize.h) > 12;
      state.lastStageSize = { w: size.w, h: size.h };
      if (!changed || !state.wiring || !state.autoLayoutResponsive) return;
      clearTimeout(state.resizeTimer);
      state.resizeTimer = setTimeout(() => {
        autoLayoutInternal();
        rebuildModel();
        render();
        frameLayoutReadably();
        toast("Layout adapted to the new screen size");
      }, 220);
    }

    function handleAction(action, target) {
      if (action === "open") fileInput.click();
      else if (action === "save") saveDocument();
      else if (action === "menu") openMenu();
      else if (action === "close-sheet") closeSheet();
      else if (action === "fit") fitAll();
      else if (action === "layout") {
        if (!state.wiring) return;
        const before = snapshot();
        autoLayoutInternal();
        pushHistory(before);
        state.dirty = true;
        rebuildModel();
        render();
        updateChrome();
        frameLayoutReadably();
        toast("Automatic layout applied");
      } else if (action === "search") openSearch();
      else if (action === "undo") undo();
      else if (action === "redo") redo();
      else if (action === "demo") loadDocument(demoDocument(), "demo_wiring.json", { dirty: true });
      else if (action === "diagnostics") showDiagnostics();
      else if (action === "help") showHelp();
      else if (action === "json-editor") openJsonEditor();
      else if (action === "add-node") addNode();
      else if (action === "new-document") {
        if (state.dirty && !window.confirm("Discard unsaved changes and create a new wiring document?")) return;
        const name = "node_start";
        loadDocument({ schema: "endgame-ai.wiring", topology: { cycle_start: name, nodes: [name], edges: { [name]: { halt: "halt" } }, barriers: {} }, prompts: { [name]: "" }, prompt_aliases: {}, node_defs: {} }, "wiring.json", { dirty: true });
      } else if (action === "select-wire") {
        const key = target.getAttribute("data-wire-key");
        const index = state.wires.findIndex(wire => wireKey(wire) === key);
        selectWire(index, true);
      } else if (action === "add-branch") {
        beginConnect({ mode: "add", source: target.getAttribute("data-node"), signal: target.getAttribute("data-signal") });
      } else if (action === "center-selected") {
        if (state.selection?.type === "node") centerOn(state.selection.id, 1.15);
        closeSheet();
      } else if (action === "set-start") {
        const name = state.selection?.id;
        mutate(() => { topology().cycle_start = name; }, `${name} is now the cycle start`);
      } else if (action === "add-signal") addSignal();
      else if (action === "rename-node") renameNode();
      else if (action === "delete-node") deleteNode();
      else if (action === "save-prompt") {
        const key = target.getAttribute("data-prompt-key");
        const value = root.querySelector("#ewl-prompt-editor")?.value ?? "";
        mutate(() => { state.wiring.prompts[key] = value; }, `Saved prompt ${key}`);
      } else if (action === "focus-node") {
        const name = target.getAttribute("data-node");
        selectNode(name, true);
        centerOn(name, 1.05);
      } else if (action === "reconnect-wire") {
        const wire = state.wires.find(item => wireKey(item) === wireKey(state.selection || {}));
        if (wire) beginConnect({ mode: "reconnect", source: wire.source, signal: wire.signal, index: wire.index });
      } else if (action === "delete-wire") deleteWire();
      else if (action === "cancel-connect") { state.connect = null; state.preview = null; render(); }
      else if (action === "target-sentinel") finishConnect(target.getAttribute("data-target"));
      else if (action === "search-result") {
        const name = target.getAttribute("data-node");
        closeSheet();
        selectNode(name, false);
        centerOn(name, 1.25);
      } else if (action === "format-json") {
        const editor = root.querySelector("#ewl-json-editor");
        try { editor.value = JSON.stringify(JSON.parse(editor.value), null, 2); } catch (error) { toast(`Invalid JSON: ${error.message}`); }
      } else if (action === "apply-json") {
        const editor = root.querySelector("#ewl-json-editor");
        try {
          const parsed = JSON.parse(editor.value);
          const error = basicDocumentError(parsed);
          if (error) throw new Error(error);
          const before = snapshot();
          const previousPositions = clone(state.positions);
          state.wiring = clone(parsed);
          delete state.wiring.__wiring_lab;
          state.wires = listWires();
          state.positions = Object.fromEntries(Object.entries(previousPositions).filter(([name]) => [...state.wiring.topology.nodes, ...listWires().map(wire => wire.target)].includes(name)));
          if (allBoxNames().some(name => !state.positions[name])) autoLayoutInternal();
          pushHistory(before);
          state.dirty = true;
          state.selection = null;
          rebuildModel();
          updateChrome();
          render();
          closeSheet();
          state.autoLayoutResponsive ? frameLayoutReadably() : fitAll();
          toast("JSON applied");
        } catch (error) { toast(`Cannot apply JSON: ${error.message}`); }
      }
    }

    root.addEventListener("click", event => {
      const target = eventTarget(event)?.closest("[data-action]");
      if (!target) return;
      event.preventDefault();
      handleAction(target.getAttribute("data-action"), target);
    });

    root.addEventListener("change", event => {
      const target = eventTarget(event);
      if (target?.id === "ewl-family-toggle") {
        const before = snapshot();
        state.groupFamilies = target.checked;
        autoLayoutInternal();
        pushHistory(before);
        state.dirty = true;
        rebuildModel();
        updateChrome();
        render();
        frameLayoutReadably();
        openMenu();
      } else if (target?.id === "ewl-auto-layout-toggle") {
        const before = snapshot();
        state.autoLayoutResponsive = target.checked;
        if (state.autoLayoutResponsive) {
          autoLayoutInternal();
          rebuildModel();
          render();
          requestAnimationFrame(frameLayoutReadably);
        }
        pushHistory(before);
        state.dirty = true;
        updateChrome();
        openMenu();
        toast(state.autoLayoutResponsive ? "Responsive auto layout enabled" : "Responsive auto layout disabled");
      } else if (target?.id === "ewl-layout-toggle") {
        state.includeLayout = target.checked;
        openMenu();
      }
    });

    fileInput.addEventListener("change", () => importFile(fileInput.files?.[0]));
    svg.addEventListener("pointerdown", pointerDown);
    svg.addEventListener("pointermove", pointerMove);
    svg.addEventListener("pointerup", pointerUp);
    svg.addEventListener("pointercancel", pointerCancel);
    svg.addEventListener("wheel", event => {
      if (!state.wiring) return;
      event.preventDefault();
      zoomAt(event.clientX, event.clientY, state.view.zoom * Math.exp(-event.deltaY * .0015));
    }, { passive: false });

    stage.addEventListener("dragover", event => { event.preventDefault(); event.dataTransfer.dropEffect = "copy"; });
    stage.addEventListener("drop", event => { event.preventDefault(); importFile(event.dataTransfer.files?.[0]); });
    new ResizeObserver(handleStageResize).observe(stage);

    window.addEventListener("keydown", event => {
      const editing = event.target instanceof HTMLInputElement || event.target instanceof HTMLTextAreaElement;
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "o") { event.preventDefault(); fileInput.click(); }
      else if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") { event.preventDefault(); saveDocument(); }
      else if (!editing && (event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z") { event.preventDefault(); event.shiftKey ? redo() : undo(); }
      else if (!editing && (event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "y") { event.preventDefault(); redo(); }
      else if (!editing && event.key === "Escape") { if (state.connect) { state.connect = null; render(); } else closeSheet(); }
      else if (!editing && (event.key === "Delete" || event.key === "Backspace")) {
        if (state.selection?.type === "wire") deleteWire();
        else if (state.selection?.type === "node" && nodes().includes(state.selection.id)) deleteNode();
      }
    });

    window.addEventListener("beforeunload", event => {
      if (!state.dirty) return;
      event.preventDefault();
      event.returnValue = "";
    });

    updateChrome();
    render();
  })();
  </script>
</div>

<script id="codex-visualization-tooltip">/* oxlint-disable typescript/no-unsafe-argument, typescript/no-unsafe-call, typescript/no-unsafe-return */
// Runs inside the visualization sandbox, not the host webview.
(() => {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set(["top", "right", "bottom", "left"]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =>
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest("[data-tooltip]")
      : null;
  const containsTarget = (trigger, target) =>
    target?.nodeType != null && trigger.contains(target);
  const getContent = (trigger) =>
    trigger.getAttribute("data-tooltip")?.trim() ?? "";
  const getPlacement = (trigger) => {
    const placement = trigger.getAttribute("data-tooltip-placement");
    return tooltipPlacements.has(placement) ? placement : "top";
  };
  const getTooltip = () => {
    if (tooltip == null) {
      tooltip = document.createElement("div");
      tooltip.id = tooltipId;
      tooltip.className = "tooltip";
      tooltip.setAttribute("role", "tooltip");
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) => {
    const ids = new Set(
      (trigger.getAttribute("aria-describedby") ?? "")
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute("aria-describedby");
    } else {
      trigger.setAttribute("aria-describedby", [...ids].join(" "));
    }
  };
  const clearOpenTimeout = () => {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) => {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) => {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              "--tooltip-available-width",
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              "--tooltip-available-height",
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: "fixed",
    })
      .then(({ x, y }) => {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = "visible";
      })
      .catch(() => {
        if (activeTrigger === trigger && request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) => {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = "hidden";
    floating.style.transform = "translate(0, 0)";
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () => {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) => {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() < skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() => {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) => {
    if (event.pointerType === "touch") {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) => {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) => {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(":focus-visible")) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) => {
    if (event.key === "Escape") {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) => {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () => {
    closeTooltip(false);
    document.removeEventListener("pointerover", handlePointerOpen);
    document.removeEventListener("pointerout", handleLeave);
    document.removeEventListener("focusin", handleFocusIn);
    document.removeEventListener("focusout", handleLeave);
    document.removeEventListener("keydown", handleKeyDown);
    document.removeEventListener("contextmenu", handleContextMenu);
    tooltip = null;
  };

  document.addEventListener("pointerover", handlePointerOpen);
  document.addEventListener("pointerout", handleLeave);
  document.addEventListener("focusin", handleFocusIn);
  document.addEventListener("focusout", handleLeave);
  document.addEventListener("keydown", handleKeyDown);
  document.addEventListener("contextmenu", handleContextMenu);
  window.addEventListener("pagehide", destroy, { once: true });
})();
</script>
<script id="codex-visualization-lucide-initialization">(() => {
  const initialize = () => {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById("codex-visualization-lucide")
    ?.addEventListener("load", initialize, { once: true });
})();
</script>
</body>
</html>
